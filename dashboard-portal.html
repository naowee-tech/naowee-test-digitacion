<title>SUID — Inicio Digitador · Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="design-system.css"/>
<style>
:root {
  --naranja:#FF7500; --azul:#002B5B;
  --text-primary:#282834; --text-secondary:#646587;
  --accent:#d74009;
  --green:#1f8923; --green-bg:#e6f4e7; --green-border:#b7dfb9;
  --surface:#ffffff; --bg:#ffffff;
  --border:#e7e9f3; --border-dark:#d0d4e6;
  --blue-info:#1f78d1; --blue-bg:#eef5ff;
  --sidebar-w:274px; --header-h:88px;
  --radius-sm:6px; --radius-md:8px; --radius-lg:12px; --radius-xl:20px; --radius-full:9999px;
  --font:'Inter',sans-serif;
  --shadow-card:0 0 2px rgba(145,158,171,.2),0 12px 24px -4px rgba(145,158,171,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);font-size:14px}

/* SHELL */
.shell{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;transition:width .2s,min-width .2s}
.sidebar-logo{height:var(--header-h);display:flex;align-items:center;gap:16px;padding:0 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.burger-btn{background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;width:24px;height:24px;flex-shrink:0;border-radius:var(--radius-sm);transition:background .15s,transform .2s}
.burger-btn:hover{background:rgba(0,0,0,.06)}
.burger-btn:active{transform:scale(.9)}
.burger-btn svg{transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar.collapsed .burger-btn svg{transform:rotate(180deg)}
.naowee-logo{height:33px;flex-shrink:0}
.sidebar-nav{flex:1;padding:24px 0 10px;display:flex;flex-direction:column;gap:10px}
.nav-section{font-size:12px;font-weight:600;color:#b5b9d4;letter-spacing:0;padding:0 12px;line-height:16px}
.nav-row{display:flex;align-items:center;gap:12px;height:44px;padding:0 20px 0 0;border-radius:var(--radius-sm);cursor:pointer;transition:background .12s;position:relative}
.nav-row:hover{background:#f5f6fa}
.nav-row .icon{width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-left:28px}
.nav-row .lbl{flex:1;font-size:14px;font-weight:600;color:var(--text-primary)}
.nav-row .badge-red{width:7px;height:7px;background:#e52000;border-radius:50%}
.nav-row .nav-arrow{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:.7}
.active-bar{position:absolute;left:4px;top:8px;width:4px;height:28px;background:var(--accent);border-radius:25px}
.nav-row.active{background:transparent}
.nav-row.active:hover{background:transparent}
.nav-row.active .lbl{color:var(--accent)}
.subnav{padding-left:0}
.sub-row{display:flex;align-items:center;gap:8px;height:36px;padding:0 8px 0 64px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text-secondary);transition:background .12s}
.sub-row:hover{background:#f5f6fa}
.sub-row .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sub-row.active-sub{color:var(--accent);font-weight:600}
.sub-row.active-sub .dot{background:var(--accent)}
.sidebar-bottom{padding:8px 0;border-top:1px solid var(--border)}
.sidebar.collapsed{width:72px;min-width:72px;overflow:hidden}
.sidebar.collapsed .naowee-logo,.sidebar.collapsed .lbl,.sidebar.collapsed .nav-arrow,.sidebar.collapsed .nav-section,.sidebar.collapsed .subnav,.sidebar.collapsed .sidebar-bottom .lbl{display:none}
.sidebar.collapsed .sidebar-logo{justify-content:center;padding:0}
.sidebar.collapsed .nav-row{justify-content:center;padding:0}
.sidebar.collapsed .nav-row .icon{margin-left:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* TOP HEADER */
.top-header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:16px;padding:0 24px;flex-shrink:0}
.user-chip{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:var(--radius-full);padding:6px 12px 6px 6px;cursor:pointer}
.ava{position:relative}
.ava-ring{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.ava-dot{position:absolute;bottom:0;right:0;width:8px;height:8px;background:var(--green);border:2px solid #fff;border-radius:50%}
.user-info{display:flex;flex-direction:column;gap:1px}
.user-name{font-size:13px;font-weight:700;color:var(--text-primary)}
.user-role{font-size:11px;color:var(--text-secondary)}

/* PAGE */
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding:28px 32px 40px}

/* Dashboard Header */
.dash-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.dash-title{font-size:24px;font-weight:700;color:var(--text-primary);margin-bottom:4px}
.dash-sub{font-size:13px;color:var(--text-secondary)}
.btn-new{display:flex;align-items:center;gap:8px;height:44px;padding:0 20px;border-radius:var(--radius-md);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;border:none;background:var(--accent);color:#fff;white-space:nowrap}
.btn-new:hover{opacity:.9}

/* Stat Cards Row */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-card);padding:28px 24px;display:flex;align-items:center;justify-content:space-between;border-left:4px solid transparent;position:relative}
.stat-card.blue{border-left-color:#26d4ff}
.stat-card.green{border-left-color:#1f8923}
.stat-card.purple{border-left-color:#9b59b6}
.stat-card.orange{border-left-color:var(--naranja)}
.stat-label{font-size:12px;font-weight:600;color:var(--text-primary);letter-spacing:0;margin-bottom:4px}
.stat-value{font-size:18px;font-weight:700;color:#0f172a;letter-spacing:.2px;margin-bottom:4px}
.stat-sub{font-size:12px;font-weight:500;color:#64748b}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-icon.blue-bg{background:#cef4ff}
.stat-icon.green-bg{background:#e6f4e7}
.stat-icon.purple-bg{background:#f0e6ff}
.stat-icon.orange-bg{background:#fff3e6}

/* Middle Cards Row */
.mid-row{display:grid;grid-template-columns:1fr 1.5fr 1fr;gap:18px;margin-bottom:24px;align-items:start}
.mid-card{background:var(--surface);border-radius:var(--radius-xl);border:1px solid var(--border);padding:20px 22px;overflow:hidden}
.mid-card-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--border)}
.mid-card-title{font-size:15px;font-weight:700;color:var(--text-primary)}
.ver-link{font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;text-decoration:none;padding:4px 8px;border-radius:var(--radius-sm);transition:background .15s}
.ver-link:hover{background:var(--orange-bg)}

/* Digitadores List */
.digi-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.digi-ava{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.digi-info{flex:1;min-width:0}
.digi-name{font-size:13px;font-weight:600;color:var(--text-primary)}
.digi-sub{font-size:11px;color:var(--text-secondary)}
.digi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.digi-dot.online{background:var(--green)}
.digi-dot.offline{background:var(--border-dark)}
.digi-footer{display:flex;gap:12px;padding-top:10px;margin-top:6px;border-top:1px solid var(--border)}
.digi-footer span{font-size:12px;font-weight:600}
.digi-footer .activos{color:var(--green)}
.digi-footer .inactivos{color:var(--text-secondary)}

/* Por deporte grid */
.deporte-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.deporte-count{font-size:12px;font-weight:600;color:var(--text-secondary);background:#f5f6fa;padding:2px 10px;border-radius:var(--radius-full)}
.deporte-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;align-content:start}
.deporte-item{display:flex;align-items:center;gap:6px;padding:3px 0}
.deporte-name{font-size:12px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;max-width:90px}
.deporte-val{font-size:12px;font-weight:700;color:var(--text-primary);min-width:18px;text-align:right;flex-shrink:0}
.deporte-bar{flex:1;height:4px;border-radius:var(--radius-full);background:var(--border);overflow:hidden;min-width:0}
.deporte-bar-fill{height:100%;border-radius:var(--radius-full);background:var(--blue-info)}

/* Estados */
.estado-total{font-size:13px;font-weight:700;color:var(--text-primary);text-align:right;margin-bottom:12px}
.estado-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.estado-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.estado-label{flex:1;font-size:13px;color:var(--text-primary)}
.estado-bar{flex:2;height:4px;border-radius:var(--radius-full);background:var(--border);overflow:hidden}
.estado-bar-fill{height:100%;border-radius:var(--radius-full)}
.estado-val{font-size:13px;font-weight:700;color:var(--text-primary);min-width:20px;text-align:right}

/* Competencias Recientes Table */
.recent-card{background:var(--surface);border-radius:var(--radius-xl);border:1px solid var(--border);overflow:hidden}
.recent-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px}
.recent-title{font-size:16px;font-weight:700;color:var(--text-primary)}
.table-wrap{overflow-x:auto;padding:4px 12px 0}
table{width:100%;border-collapse:separate;border-spacing:0}
thead th{font-size:12px;font-weight:600;color:var(--text-secondary);text-align:left;padding:12px 20px;background:#f5f6fa;white-space:nowrap;border:none}
thead th:first-child{border-radius:12px 0 0 12px}
thead th:last-child{border-radius:0 12px 12px 0}
tbody td{font-size:13px;color:var(--text-primary);padding:14px 20px;vertical-align:middle;border-bottom:1px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafbfd}
.comp-name{font-weight:600;color:var(--text-primary)}
.comp-sport{font-size:11px;color:var(--text-secondary);display:flex;align-items:center;gap:4px;margin-top:2px}
.badge-sistema{display:inline-flex;padding:3px 10px;border-radius:var(--radius-full);font-size:11px;font-weight:600;white-space:nowrap;background:#f0f2f5;color:var(--text-secondary)}
.badge-sistema.elim,.badge-sistema.robin,.badge-sistema.final,.badge-sistema.grupos,.badge-sistema.rondas{background:#f0f2f5;color:var(--text-secondary)}
.badge-estado{display:inline-flex;padding:3px 10px;border-radius:var(--radius-full);font-size:11px;font-weight:700;white-space:nowrap}
.badge-estado.digitacion{background:#fff3e6;color:var(--naranja)}
.badge-estado.pausa{background:#fff0ee;color:#c04020}
.badge-estado.finalizada{background:var(--green-bg);color:var(--green)}
.badge-estado.asignada{background:#e8f4ff;color:#1f78d1}
.digi-chip{display:flex;align-items:center;gap:8px}
.digi-chip-ava{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.ver-detalle{font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;text-decoration:none;white-space:nowrap}
.ver-detalle:hover{text-decoration:none}
a{text-decoration:none}
.evento-main{font-size:13px;color:var(--text-primary)}
.evento-sub{font-size:11px;color:var(--text-secondary)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeInUp .4s ease-out}
/* PROFILE SWITCHER */
.profile-switcher{position:relative}
.profile-current{display:flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius-full);cursor:pointer;font-size:13px;font-weight:600;color:var(--text-primary);transition:all .15s;background:var(--surface)}
.profile-current:hover{border-color:var(--accent);background:#fff8f4}
.profile-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:260px;z-index:100;display:none;overflow:hidden}
.profile-dropdown.open{display:block}
.profile-option{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .12s;color:var(--text-secondary)}
.profile-option:hover{background:#f5f6fa}
.profile-option.active{background:#fff3e6;color:var(--accent)}
.po-name{font-size:13px;font-weight:600;color:inherit}
.po-desc{font-size:11px;color:var(--text-secondary);margin-top:1px}
</style>

function fadeAndGo(url){document.body.style.transition='opacity .25s ease';document.body.style.opacity='0';setTimeout(()=>{window.location.href=url},260)}
function switchProfile(p){
  document.getElementById('profileDropdown').classList.remove('open');
  if(p==='coordinador') fadeAndGo('stepper.html');
  if(p==='digitador') fadeAndGo('digitador.html');
}

});

function renderDashboardTable(){
  const tbody = document.getElementById('dashboardTbody');
  const statusLabels = {'en-digitacion':'En digitación','asignada':'Asignada','en-pausa':'En pausa','finalizada':'Finalizada'};
  const statusClasses = {'en-digitacion':'digitacion','asignada':'asignada','en-pausa':'pausa','finalizada':'finalizada'};
  const sistemaClasses = {'Eliminación directa':'elim','Round robin':'robin','Fase de grupos':'grupos','Final directa':'final','Rondas':'rondas'};
  const actionLabels = {'en-digitacion':'Continuar','en-pausa':'Continuar','asignada':'Iniciar','finalizada':'Ver'};

  let totalAsignaciones=0, totalFinalizadas=0, totalEnfrentamientos=0, totalPendientes=0;

  tbody.innerHTML = DASH_COMPS.map(c => {
    const sp = SPORTS_DB[c.sport];
    const emoji = sp ? sp.emoji : '🏅';
    const label = sp ? sp.label : c.sport;
    const pct = c.total > 0 ? Math.round((c.completed / c.total) * 100) : 0;
    const barColor = 'var(--green)';

    totalAsignaciones++;
    totalEnfrentamientos += c.total;
    if(c.status==='finalizada') totalFinalizadas++;
    else totalPendientes += (c.total - c.completed);

    return `<tr>
      <td><div class="comp-name">${c.name}</div><div class="comp-sport">${emoji} ${label} · ${c.zona}</div></td>
      <td><span class="badge-sistema ${sistemaClasses[c.sistema]||'grupos'}">${c.sistema}</span></td>
      <td><div style="display:flex;align-items:center"><div style="width:48px;height:4px;background:var(--border);border-radius:var(--radius-full)"><div style="height:100%;width:${pct}%;background:${barColor};border-radius:var(--radius-full)"></div></div></div></td>
      <td><span class="badge-estado ${statusClasses[c.status]}">${statusLabels[c.status]}</span></td>
      <td><a class="ver-detalle" href="digitador.html?comp=${c.id}">${actionLabels[c.status]}</a></td>
    </tr>`;
  }).join('');

  // Update stat cards
  document.querySelector('.stat-card.blue .stat-value').textContent = totalAsignaciones;
  document.querySelector('.stat-card.green .stat-value').textContent = totalFinalizadas;
  document.querySelector('.stat-card.purple .stat-value').textContent = totalEnfrentamientos;
  document.querySelector('.stat-card.orange .stat-value').textContent = totalPendientes;
}

renderDashboardTable();

document.getElementById('btnLogout')?.addEventListener('click', () => {
  fadeAndGo('../escenarios/escenario-01-login.html');
});
</script>
