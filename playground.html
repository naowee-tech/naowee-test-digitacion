<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Naowee Design System — Playground</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>
/* ── PLAYGROUND SHELL ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#f5f6fa;color:#282834;display:flex;min-height:100vh;overflow:hidden}

/* ── SIDEBAR ──────────────────────────────────────────── */
#pg-sidebar{
  position:fixed;left:0;top:0;bottom:0;width:260px;
  background:#282834;color:#fff;display:flex;flex-direction:column;
  z-index:100;transition:width .2s ease;overflow:hidden;
}
.pg-sidebar-header{
  padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
}
.pg-sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.pg-sidebar-logo svg{width:28px;height:28px;color:#FF7500}
.pg-sidebar-logo span{font-size:15px;font-weight:700;letter-spacing:-.3px}
.pg-sidebar-logo small{font-size:10px;font-weight:600;color:#9C9EBF;margin-left:4px;background:rgba(255,255,255,.08);padding:2px 6px;border-radius:4px}
.pg-sidebar-search{position:relative}
.pg-sidebar-search input{
  width:100%;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);color:#fff;padding:0 12px 0 32px;
  font-size:12px;font-family:inherit;outline:none;transition:border .15s;
}
.pg-sidebar-search input::placeholder{color:#646587}
.pg-sidebar-search input:focus{border-color:rgba(255,117,0,.5)}
.pg-sidebar-search svg{position:absolute;left:10px;top:9px;width:14px;height:14px;color:#646587;pointer-events:none}

.pg-sidebar-nav{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.pg-sidebar-nav::-webkit-scrollbar{width:4px}
.pg-sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.pg-nav-group{}
.pg-nav-group-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 20px;cursor:pointer;user-select:none;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:#9C9EBF;transition:color .15s;
}
.pg-nav-group-header:hover{color:#fff}
.pg-nav-group-header svg{width:12px;height:12px;transition:transform .2s}
.pg-nav-group.collapsed .pg-nav-group-header svg{transform:rotate(-90deg)}
.pg-nav-group.collapsed .pg-nav-group-items{display:none}

.pg-nav-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 20px 6px 28px;cursor:pointer;
  font-size:13px;font-weight:500;color:#A3A3BD;
  border-left:2px solid transparent;transition:all .12s;
}
.pg-nav-item:hover{color:#fff;background:rgba(255,255,255,.04)}
.pg-nav-item.active{color:#FF7500;border-left-color:#FF7500;background:rgba(255,117,0,.06);font-weight:600}
.pg-nav-item.hidden{display:none}

/* ── MAIN CONTENT ─────────────────────────────────────── */
#pg-main{margin-left:260px;flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

.pg-topbar{
  height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;background:#fff;border-bottom:1px solid #E7E9F3;
}
.pg-topbar-title{font-size:16px;font-weight:700;color:#282834}
.pg-topbar-desc{font-size:12px;color:#646587;margin-left:12px;font-weight:400}
.pg-topbar-actions{display:flex;gap:8px;align-items:center}
.pg-topbar-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;background:#FFEDC7;color:#D74009}

.pg-body{flex:1;overflow-y:auto;padding:32px}

/* ── COMPONENT VIEW ───────────────────────────────────── */
.pg-component-layout{display:flex;gap:24px;align-items:flex-start}
.pg-preview-wrap{
  flex:1;min-width:0;background:#fff;border:1px solid #E7E9F3;
  border-radius:16px;padding:40px;display:flex;align-items:center;
  justify-content:center;min-height:240px;position:relative;
}
.pg-preview-wrap[data-bg="dark"]{background:#282834}
.pg-preview-wrap[data-bg="gray"]{background:#f5f6fa}

/* ── CONTROLS PANEL ───────────────────────────────────── */
.pg-controls{
  width:280px;flex-shrink:0;background:#fff;border:1px solid #E7E9F3;
  border-radius:16px;padding:20px;max-height:calc(100vh - 150px);
  overflow-y:auto;scrollbar-width:thin;
}
.pg-controls::-webkit-scrollbar{width:4px}
.pg-controls::-webkit-scrollbar-thumb{background:#E7E9F3;border-radius:2px}
.pg-controls-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#9C9EBF;margin-bottom:16px}
.pg-controls-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#282834;margin:14px 0 8px;padding-bottom:6px;border-bottom:1px solid #e7e9f3}
.pg-controls-section:first-child{margin-top:0}

.pg-control{margin-bottom:16px}
.pg-control:last-child{margin-bottom:0}
.pg-control-label{font-size:11px;font-weight:600;color:#646587;margin-bottom:6px;display:block}

/* Segmented control for options */
.pg-segmented{display:flex;gap:2px;background:#f5f6fa;border-radius:8px;padding:2px;flex-wrap:wrap}
.pg-segmented-btn{
  flex:1 1 auto;min-width:fit-content;padding:5px 10px;border:none;background:none;
  font-size:11px;font-weight:500;font-family:inherit;color:#646587;
  border-radius:6px;cursor:pointer;transition:all .12s;text-align:center;
  white-space:nowrap;
}
.pg-segmented-btn:hover{color:#282834}
.pg-segmented-btn.active{background:#fff;color:#282834;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* Toggle switch for controls */
.pg-toggle{display:flex;align-items:center;gap:8px;cursor:pointer}
.pg-toggle-track{
  width:32px;height:18px;border-radius:9px;background:#D0D4E6;
  position:relative;transition:background .15s;flex-shrink:0;
}
.pg-toggle-track.on{background:#D74009}
.pg-toggle-track::after{
  content:'';position:absolute;width:14px;height:14px;border-radius:50%;
  background:#fff;top:2px;left:2px;transition:transform .15s;
}
.pg-toggle-track.on::after{transform:translateX(14px)}
.pg-toggle-label{font-size:12px;color:#434565}

/* Text input for controls */
.pg-control input[type="text"]{
  width:100%;height:32px;border:1px solid #D0D4E6;border-radius:6px;
  padding:0 10px;font-size:12px;font-family:inherit;color:#282834;outline:none;
}
.pg-control input[type="text"]:focus{border-color:#D74009}

/* Range slider for controls */
.pg-control input[type="range"]{width:100%;accent-color:#D74009}
.pg-control .pg-range-val{font-size:11px;color:#9C9EBF;margin-top:2px}

/* ── CODE OUTPUT ──────────────────────────────────────── */
.pg-code-wrap{margin-top:16px}
.pg-code-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.pg-code-bar span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9C9EBF}
.pg-copy-btn{
  border:none;background:none;font-size:11px;font-weight:600;color:#D74009;
  cursor:pointer;font-family:inherit;padding:2px 6px;border-radius:4px;
}
.pg-copy-btn:hover{background:#FFEDC7}
.pg-code{
  background:#282834;color:#A3A3BD;border-radius:8px;padding:12px 14px;
  font-family:'SF Mono','Fira Code',monospace;font-size:11px;line-height:1.6;
  white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;
}

/* ── FOUNDATION SECTIONS ──────────────────────────────── */
.pg-foundation{max-width:960px}
.pg-foundation h3{font-size:14px;font-weight:700;color:#282834;margin:24px 0 12px}
.pg-foundation h3:first-child{margin-top:0}

/* Color swatches */
.pg-palette{margin-bottom:20px}
.pg-palette-name{font-size:12px;font-weight:600;color:#646587;margin-bottom:6px}
.pg-swatches{display:flex;gap:2px;border-radius:10px;overflow:hidden}
.pg-swatch{
  flex:1;height:48px;display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:4px;font-size:8px;font-weight:600;cursor:pointer;position:relative;
  transition:transform .1s;
}
.pg-swatch:hover{transform:scaleY(1.15);z-index:1}
.pg-swatch span{opacity:.7}
.pg-swatch[data-light] span{color:#282834}
.pg-swatch[data-dark] span{color:#fff}
.pg-swatch-tip{
  display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#282834;color:#fff;padding:4px 8px;border-radius:4px;font-size:10px;
  white-space:nowrap;z-index:10;pointer-events:none;
}
.pg-swatch:hover .pg-swatch-tip{display:block}

/* Semantic colors */
.pg-semantic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:20px}
.pg-semantic-item{
  display:flex;align-items:center;gap:8px;padding:6px 10px;
  background:#fff;border:1px solid #E7E9F3;border-radius:8px;font-size:11px;
}
.pg-semantic-dot{width:20px;height:20px;border-radius:6px;flex-shrink:0;border:1px solid rgba(0,0,0,.06)}
.pg-semantic-label{color:#434565;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Typography specimens */
.pg-type-row{display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid #f5f6fa}
.pg-type-meta{width:100px;flex-shrink:0;font-size:11px;color:#9C9EBF;font-weight:500}
.pg-type-sample{flex:1;color:#282834;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Spacing bars */
.pg-space-row{display:flex;align-items:center;gap:12px;padding:4px 0}
.pg-space-label{width:80px;flex-shrink:0;font-size:11px;color:#646587;font-weight:500;text-align:right}
.pg-space-bar{height:20px;background:linear-gradient(90deg,#FF7500,#D74009);border-radius:4px;transition:width .3s}
.pg-space-val{font-size:10px;color:#9C9EBF;font-weight:500;min-width:36px}

/* Shadow cards */
.pg-shadow-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.pg-shadow-card{
  background:#fff;border-radius:12px;padding:24px 16px;text-align:center;
  font-size:11px;color:#646587;font-weight:500;
}

/* Radius demo */
.pg-radius-grid{display:flex;gap:12px;flex-wrap:wrap}
.pg-radius-item{
  width:64px;height:64px;background:#FFEDC7;border:2px solid #FF7500;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;color:#D74009;text-align:center;line-height:1.3;
}

/* ── RESPONSIVE ───────────────────────────────────────── */
@media(max-width:960px){
  #pg-sidebar{width:56px}
  #pg-sidebar .pg-sidebar-logo span,
  #pg-sidebar .pg-sidebar-logo small,
  #pg-sidebar .pg-sidebar-search,
  #pg-sidebar .pg-nav-group-header span,
  #pg-sidebar .pg-nav-item span{display:none}
  #pg-sidebar .pg-nav-item{padding:8px 0;justify-content:center}
  #pg-sidebar .pg-nav-group-header{justify-content:center;padding:8px 0}
  #pg-main{margin-left:56px}
  .pg-component-layout{flex-direction:column}
  .pg-controls{width:100%}
}

/* ── MISC ─────────────────────────────────────────────── */
/* Icon grid */
.pg-icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:20px}
.pg-icon-card{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:12px 8px;border-radius:10px;cursor:pointer;
  border:1px solid transparent;transition:all .12s;
}
.pg-icon-card:hover{background:#fff;border-color:#E7E9F3;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.pg-icon-preview{color:#282834;display:flex;align-items:center;justify-content:center}
.pg-icon-name{font-size:9px;color:#9C9EBF;font-weight:500;text-align:center;word-break:break-all;line-height:1.2}

.pg-tag-figma{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#E9F1FF;color:#5C70FA;margin-left:6px;vertical-align:middle}
.pg-tag-custom{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#DEFADE;color:#1F8923;margin-left:6px;vertical-align:middle}
</style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<aside id="pg-sidebar">
  <div class="pg-sidebar-header">
    <div class="pg-sidebar-logo">
      <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="2"/><path d="M8 14l4 4 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Naowee DS</span>
      <small>v1.8</small>
    </div>
    <div class="pg-sidebar-search">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M10 10l4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="pg-search" placeholder="Buscar componente..." autocomplete="off">
    </div>
  </div>
  <nav class="pg-sidebar-nav" id="pg-nav"></nav>
</aside>

<!-- ═══ MAIN ═══ -->
<main id="pg-main">
  <div class="pg-topbar">
    <div style="display:flex;align-items:center">
      <span class="pg-topbar-title" id="pg-title">Colors</span>
      <span class="pg-topbar-desc" id="pg-desc"></span>
    </div>
    <div class="pg-topbar-actions">
      <span class="pg-topbar-badge">38 Components</span>
    </div>
  </div>
  <div class="pg-body" id="pg-body"></div>
</main>

/* Helper: render icon as SVG string */
function naoIcon(name, size) {
  var s = size || 24;
  var icon = NAOWEE_ICONS[name];
  if (!icon) return '';
  var vb = icon.vb || 24;
  if (icon.filled) {
    return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 '+vb+' '+vb+'" fill="currentColor" xmlns="http://www.w3.org/2000/svg">' + icon.d + '</svg>';
  }
  return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 '+vb+' '+vb+'" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' + icon.d + '</svg>';
}

      return '<div class="naowee-snackbar">' +
        '<div class="naowee-snackbar__content">' + badge +
          '<span class="naowee-snackbar__text">' + s.text + '</span>' +

  progress: {
    id:'progress', label:'Progress', desc:'Indicador de progreso: linear, circular o segmented', tag:'figma',
    controls: [
      { type:'select', label:'Type', prop:'type', options:[
        {l:'Linear',v:'linear'},{l:'Circular',v:'circular'},{l:'Segments',v:'segments'}
      ], default:0 },
      { type:'select', label:'Size', prop:'size', options:[
        {l:'XS',v:'xs'},{l:'S',v:'sm'},{l:'M',v:'md'},{l:'L',v:'lg'},{l:'XL',v:'xl'}
      ], default:2 },
      { type:'select', label:'Color', prop:'color', options:[
        {l:'Accent',v:'accent'},{l:'Positive',v:'positive'},{l:'Negative',v:'negative'}
      ], default:0 },
      { type:'toggle', label:'Show label', prop:'showLabel', cls:'show-label' },
      { type:'toggle', label:'Indeterminate', prop:'indeterminate', cls:'indeterminate' },
      { type:'range', label:'Value', prop:'value', min:0, max:100, default:65 },
    ],
    render(s) {
      var type = s.type || 'linear';
      var val = parseInt(s.value);
      // Linear: only S/L → map xs/sm → sm, md/lg/xl → lg
      if (type === 'linear') {
        var isLg = ['lg','xl'].indexOf(s.size) !== -1;
        var colorCls = s.color === 'positive' ? 'naowee-progress--positive' : s.color === 'negative' ? 'naowee-progress--negative' : '';
        var indeterminateCls = s.indeterminate ? 'naowee-progress--indeterminate' : '';
        var barCls = ['naowee-progress', isLg ? 'naowee-progress--lg' : '', colorCls, indeterminateCls].filter(Boolean).join(' ');
        var fillStyle = s.indeterminate ? '' : ' style="width:' + val + '%"';
        var bar = '<div class="' + barCls + '"><div class="naowee-progress__fill"' + fillStyle + '></div></div>';
        if (s.showLabel) {
          var wrapCls = 'naowee-progress-wrap' + (isLg ? ' naowee-progress-wrap--lg' : '');
          return '<div class="' + wrapCls + '" style="width:360px">' +
            '<div class="naowee-progress-wrap__header">' +
              '<span class="naowee-progress-wrap__label">Label</span>' +
              '<span class="naowee-progress-wrap__value">' + val + '</span>' +
            '</div>' + bar + '</div>';
        }
        return '<div style="width:360px">' + bar + '</div>';
      }
      // Circular: full 5 sizes
      if (type === 'circular') {
        var sizes = {xs:{d:16,sw:1},sm:{d:24,sw:1},md:{d:32,sw:2},lg:{d:48,sw:3},xl:{d:64,sw:4}};
        var cfg = sizes[s.size] || sizes.md;
        var d = cfg.d, sw = cfg.sw;
        var r = (d / 2) - (sw / 2);
        var circ = 2 * Math.PI * r;
        var useVal = s.indeterminate ? 25 : val;
        var offset = circ - (circ * useVal / 100);
        var colorCls = s.color === 'positive' ? 'naowee-progress-circular--positive' : s.color === 'negative' ? 'naowee-progress-circular--negative' : '';
        var indeterminateCls = s.indeterminate ? 'naowee-progress-circular--indeterminate' : '';
        var cls = ['naowee-progress-circular', 'naowee-progress-circular--' + s.size, colorCls, indeterminateCls].filter(Boolean).join(' ');
        var counterHtml = '';
        if (s.showLabel && ['md','lg','xl'].indexOf(s.size) !== -1) {
          counterHtml = '<span class="naowee-progress-circular__counter">' + String(useVal).padStart(2,'0') + '</span>';
        }
        return '<div class="' + cls + '">' +
          '<div class="naowee-progress-circular__ring" style="width:' + d + 'px;height:' + d + 'px">' +
            '<svg width="' + d + '" height="' + d + '" viewBox="0 0 ' + d + ' ' + d + '">' +
              '<circle class="naowee-progress-circular__track" cx="' + d/2 + '" cy="' + d/2 + '" r="' + r + '"/>' +
              '<circle class="naowee-progress-circular__fill" cx="' + d/2 + '" cy="' + d/2 + '" r="' + r + '" stroke-dasharray="' + circ + '" stroke-dashoffset="' + offset + '"/>' +
            '</svg>' +
            counterHtml +
          '</div>' +
          '<span class="naowee-progress-circular__text">Loading</span>' +
        '</div>';
      }
      // Segments: S/L sizes, use value as "% of 5 segments completed"
      var isLg2 = ['lg','xl'].indexOf(s.size) !== -1;
      var total = 5;
      var completed = Math.round(val / 100 * total);
      var colorCls2 = s.color === 'positive' ? 'naowee-progress-segments--positive' : s.color === 'negative' ? 'naowee-progress-segments--negative' : '';
      var segCls = ['naowee-progress-segments', isLg2 ? 'naowee-progress-segments--lg' : '', colorCls2].filter(Boolean).join(' ');
      var items = '';
      for (var i = 0; i < total; i++) {
        items += '<div class="naowee-progress-segments__item' + (i < completed ? ' naowee-progress-segments__item--active' : '') + '"></div>';
      }
      var bar2 = '<div class="' + segCls + '">' + items + '</div>';
      if (s.showLabel) {
        var wrapCls2 = 'naowee-progress-segments-wrap' + (isLg2 ? ' naowee-progress-segments-wrap--lg' : '');
        return '<div class="' + wrapCls2 + '" style="width:360px">' +
          '<div class="naowee-progress-segments-wrap__header">' +
            '<span class="naowee-progress-segments-wrap__label">Label</span>' +
            '<span class="naowee-progress-segments-wrap__value">' + completed + ' of ' + total + '</span>' +
          '</div>' + bar2 + '</div>';
      }
      return '<div style="width:360px">' + bar2 + '</div>';
    }
  },

  slider: {

  slider_range: {
    id:'slider_range', label:'Slider Range', desc:'Doble slider con rango mínimo/máximo', tag:'figma',
    controls: [
      { type:'select', label:'State', prop:'state', options:[
        {l:'Idle',v:''},{l:'Active L',v:'active-l'},{l:'Active R',v:'active-r'},{l:'Disabled',v:'disabled'}
      ], default:0 },
      { type:'select', label:'Content', prop:'content', options:[
        {l:'None',v:'none'},{l:'Text',v:'text'}
      ], default:0 },

      var rootCls = ['naowee-slider', 'naowee-slider--range', isDisabled ? 'is-disabled' : ''].filter(Boolean).join(' ');

      return '<div class="' + rootCls + '" style="width:420px">' +

          '<div class="naowee-slider__track-area">' +

  tag: {
    id:'tag', label:'Tag / Chip', desc:'Tag (dismissible), Tag Choice (selectable), Tag Input', tag:'figma',
    controls: [
      { type:'select', label:'Type', prop:'type', options:[

      ], default:0 },

        var helper = '<div class="naowee-dropdown__helper"><span class="naowee-helper naowee-helper--informative"><span class="naowee-helper__badge">' + helperBadge + '</span>Helper text</span></div>';
        return '<div class="naowee-tag-input-wrap" style="width:320px">' + label +

  tagInput: {
    id:'tagInput', label:'Tag Input', desc:'Input con tags seleccionados + helper (hereda label, estados y clear de Textfield)', tag:'figma',
    controls: [
      /* ── Variant ── */
      { section:'Variant', type:'select', label:'Size', prop:'size', options:[
        {l:'Large',v:''},{l:'Small',v:'small'}
      ], default:0 },
      { section:'Variant', type:'select', label:'State', prop:'state', options:[
        {l:'Idle',v:''},{l:'Active',v:'active'},{l:'Loading',v:'loading'},
        {l:'Caution',v:'caution'},{l:'Caution active',v:'caution-active'},
        {l:'Error',v:'error'},{l:'Error active',v:'error-active'},
        {l:'Disabled',v:'disabled'},{l:'Read only',v:'readonly'}
      ], default:0 },
      /* ── Content ── */
      { section:'Content', type:'select', label:'Tags', prop:'tagCount', options:[
        {l:'None',v:'0'},{l:'1 tag',v:'1'},{l:'2 tags',v:'2'},{l:'2 tags + counter',v:'counter'}
      ], default:3 },
      { section:'Content', type:'toggle', label:'Show clear', prop:'showClear',
        showIf:function(s){ return s.state !== 'disabled' && s.state !== 'readonly'; } },
      /* ── Label & Helper ── */
      { section:'Label & Helper', type:'text', label:'Label', prop:'label', default:'Label' },
      { section:'Label & Helper', type:'select', label:'Helper type', prop:'helperType', options:[
        {l:'None',v:'none'},{l:'Default',v:''},{l:'Caution',v:'caution'},{l:'Negative',v:'negative'},{l:'Positive',v:'positive'},{l:'Informative',v:'informative'}
      ], default:1 },
      { section:'Label & Helper', type:'text', label:'Helper text', prop:'helperText', default:'Helper text',
        showIf:function(s){ return s.helperType !== 'none'; } },
      /* ── Text ── */
      { section:'Text', type:'text', label:'Placeholder', prop:'placeholder', default:'' },
    ],
    render(s) {
      /* Wrap + state classes */
      var wrapCls = ['naowee-tag-input-wrap'];
      if (s.state === 'disabled') wrapCls.push('naowee-tag-input-wrap--disabled');
      if (s.state === 'readonly') wrapCls.push('naowee-tag-input-wrap--readonly');

      var inputCls = ['naowee-tag-input'];
      if (s.size === 'small') inputCls.push('naowee-tag-input--small');
      var stateMap = {
        'active':'active','loading':'loading',
        'caution':'caution','caution-active':'caution active',
        'error':'error','error-active':'error active',
        'disabled':'disabled','readonly':'readonly'
      };
      if (stateMap[s.state]) {
        stateMap[s.state].split(' ').forEach(function(st){ inputCls.push('naowee-tag-input--' + st); });
      }

      /* Tags */
      var tagSz = s.size === 'small' ? ' naowee-tag--small' : '';
      var dismiss = '<span class="naowee-tag__active-area"><span class="naowee-tag__close">' + naoIcon('close',12) + '</span></span>';
      var tagDisabled = (s.state === 'disabled') ? ' naowee-tag--disabled' : '';
      function tag(text, withClose){
        return '<span class="naowee-tag naowee-tag--accent' + tagSz + tagDisabled + '">' + text + (withClose ? dismiss : '') + '</span>';
      }
      var tags = '';
      if (s.tagCount === '1') tags = tag('Label', true);
      else if (s.tagCount === '2') tags = tag('Label', true) + tag('Label', true);
      else if (s.tagCount === 'counter') tags = tag('Label', true) + tag('Label', true) + tag('+3', false);

      /* Right slot: spinner (loading) + clear */
      var rightSlot = '';
      if (s.state === 'loading') {
        var iconSpinner = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg>';
        rightSlot += '<span class="naowee-tag-input__spinner">' + iconSpinner + '</span>';
      }
      if (s.showClear && s.state !== 'disabled' && s.state !== 'readonly') {
        var clearCls = s.state === 'loading' ? 'naowee-tag-input__clear' : 'naowee-tag-input__clear';
        var clearStyle = s.state === 'loading' ? '' : ' style="margin-left:auto"';

      var headerChev = calView === 'days' ? chevDown : chevUp;
      var headerTitle = calView === 'years' ? curYear : MONTH_NAMES[curMonth] + ' de ' + curYear;
      var header = '<div class="naowee-datepicker__header"><div class="naowee-datepicker__month-selector" onclick="calendarToggleView()"><span class="naowee-datepicker__month">' + headerTitle + '</span><span class="naowee-datepicker__month-chevron">' + headerChev + '</span></div>';
      if (calView === 'days') {
        header += '<div class="naowee-datepicker__controls"><button class="naowee-datepicker__nav" onclick="calendarNav(-1)">' + chevL + '</button><button class="naowee-datepicker__nav" onclick="calendarNav(1)">' + chevR + '</button></div>';
      }
      header += '</div>';

      var body = '';
      if (calView === 'months') {
        body = '<div class="naowee-datepicker__month-grid">';
        MONTH_NAMES.forEach(function(m, i) {
          var sel = i === curMonth ? ' naowee-datepicker__month-item--selected' : '';
          body += '<button class="naowee-datepicker__month-item' + sel + '" onclick="calendarSelectMonth(' + i + ')">' + m + '</button>';
        });
        body += '</div>';
      } else if (calView === 'years') {
        var startY = curYear - (curYear % 4) - 4;
        body = '<div class="naowee-datepicker__month-grid">';
        for (var yi = 0; yi < 12; yi++) {
          var y = startY + yi;
          var sel = y === curYear ? ' naowee-datepicker__month-item--selected' : '';
          body += '<button class="naowee-datepicker__month-item' + sel + '" onclick="calendarSelectYear(' + y + ')">' + y + '</button>';
        }
        body += '</div>';
      } else {
        /* Days grid */
        var wkdays = s.weekstart === 'sun' ? ['Dom','Lun','Mar','Mié','Jue','Vie','Sab'] : ['Lun','Mar','Mié','Jue','Vie','Sab','Dom'];
        var daysInMonth = MONTH_DAYS[curMonth];
        if (curMonth === 1 && curYear % 4 === 0) daysInMonth = 29;
        var firstDay = new Date(curYear, curMonth, 1).getDay();
        var startOffset = s.weekstart === 'sun' ? firstDay : (firstDay === 0 ? 6 : firstDay - 1);
        var prevMonth = curMonth === 0 ? 11 : curMonth - 1;
        var prevDays = MONTH_DAYS[prevMonth];

        var all = [];
        for (var pi = startOffset - 1; pi >= 0; pi--) all.push({d: prevDays - pi, other: true});
        for (var ci = 1; ci <= daysInMonth; ci++) all.push({d: ci, other: false});
        var remaining = 42 - all.length;
        for (var ni = 1; ni <= remaining; ni++) all.push({d: ni, other: true});

        var wkHtml = '<div class="naowee-datepicker__week">' + wkdays.map(function(w){return '<span class="naowee-datepicker__weekday">' + w + '</span>';}).join('') + '</div>';
        var weeksHtml = '';
        for (var w = 0; w < 6; w++) {
          weeksHtml += '<div class="naowee-datepicker__week">';
          for (var di = 0; di < 7; di++) {
            var cell = all[w * 7 + di];
            var cls = 'naowee-datepicker__day';
            if (cell.other) cls += ' naowee-datepicker__day--other-month';
            else if (s.selection === 'single') {
              if (cell.d === (s._selectedDay || 16)) cls += ' naowee-datepicker__day--selected';
            } else if (s.selection === 'range') {
              var rs = s._rangeStart || 8, re = s._rangeEnd || 18;
              if (cell.d === rs) cls += ' naowee-datepicker__day--range-start';
              else if (re && cell.d === re) cls += ' naowee-datepicker__day--range-end';
              else if (re && cell.d > rs && cell.d < re) cls += ' naowee-datepicker__day--in-range';
            } else if (s.selection === 'multiple') {
              var md = s._multiDays || [2,15,16,21,26];
              if (md.indexOf(cell.d) !== -1) cls += ' naowee-datepicker__day--selected';
            }
            /* Today */
            var today = new Date();
            if (cell.d === today.getDate() && curMonth === today.getMonth() && curYear === today.getFullYear() && !cell.other) cls += ' naowee-datepicker__day--today';
            weeksHtml += '<button class="' + cls + '" onclick="calendarDayClick(this)">' + cell.d + '</button>';
          }
          weeksHtml += '</div>';
        }
        body = '<div class="naowee-datepicker__content">' + wkHtml + weeksHtml + '</div>';
      }
      return '<div class="naowee-datepicker"><div class="naowee-datepicker__calendar">' + header + body + '</div></div>';
    }
  },

/* ═══════════════════════════════════════════════════════════════
   ENGINE — Routing, Controls, Rendering
   ═══════════════════════════════════════════════════════════════ */

var STATE = {};
function getState(id) {
  if (!STATE[id]) {
    STATE[id] = {};
    var comp = COMPONENTS[id];
    if (comp) {
      comp.controls.forEach(function(c) {
        if (c.type === 'select') STATE[id][c.prop] = c.options[c.default || 0].v;
        else if (c.type === 'toggle') STATE[id][c.prop] = false;
        else if (c.type === 'text') STATE[id][c.prop] = c.default || '';
        else if (c.type === 'range') STATE[id][c.prop] = c.default || 50;
      });
    }
  }
  return STATE[id];
}

/* ── Build sidebar nav ── */
function buildSidebar() {
  var nav = document.getElementById('pg-nav');
  var html = '<div class="pg-nav-group" id="pg-group-foundations">' +
    '<div class="pg-nav-group-header" onclick="toggleGroup(\'foundations\')">' +
    '<span>Foundations</span>' + ICO.chevron + '</div><div class="pg-nav-group-items">';
  FOUNDATIONS.forEach(function(f) {
    html += '<div class="pg-nav-item" data-id="' + f.id + '" onclick="navigate(\'' + f.id + '\')"><span>' + f.label + '</span></div>';
  });
  html += '</div></div>';

  var compKeys = Object.keys(COMPONENTS).sort(function(a,b){ return COMPONENTS[a].label.localeCompare(COMPONENTS[b].label); });
  html += '<div class="pg-nav-group" id="pg-group-components">' +
    '<div class="pg-nav-group-header" onclick="toggleGroup(\'components\')">' +
    '<span>Components</span>' + ICO.chevron + '</div><div class="pg-nav-group-items">';
  compKeys.forEach(function(k) {
    html += '<div class="pg-nav-item" data-id="' + k + '" onclick="navigate(\'' + k + '\')"><span>' + COMPONENTS[k].label + '</span></div>';
  });
  html += '</div></div>';
  nav.innerHTML = html;
}

function toggleGroup(name) {
  document.getElementById('pg-group-' + name).classList.toggle('collapsed');
}

/* ── Search filter ── */
document.getElementById('pg-search').addEventListener('input', function() {
  var q = this.value.toLowerCase();
  document.querySelectorAll('.pg-nav-item').forEach(function(el) {
    var label = el.textContent.toLowerCase();
    el.classList.toggle('hidden', q && !label.includes(q));
  });
  document.querySelectorAll('.pg-nav-group').forEach(function(g) {
    if (q) g.classList.remove('collapsed');
  });
});

/* ── Navigation ── */
function navigate(id) { location.hash = id; }

function onHashChange() {
  var id = location.hash.slice(1) || 'colors';
  document.querySelectorAll('.pg-nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.id === id);
  });
  var foundation = FOUNDATIONS.find(function(f){ return f.id === id; });
  var comp = COMPONENTS[id];
  var title = document.getElementById('pg-title');
  var desc = document.getElementById('pg-desc');
  if (foundation) {
    title.textContent = foundation.label;
    desc.textContent = foundation.desc;
  } else if (comp) {
    title.innerHTML = comp.label + (comp.tag === 'figma' ? '<span class="pg-tag-figma">Figma</span>' : '<span class="pg-tag-custom">Custom</span>');
    desc.textContent = comp.desc;
  }
  renderSection(id);
}

/* ── Render section ── */
function renderSection(id) {
  var body = document.getElementById('pg-body');
  var foundation = FOUNDATIONS.find(function(f){ return f.id === id; });
  if (foundation) { body.innerHTML = renderFoundation(id); return; }
  var comp = COMPONENTS[id];
  if (!comp) { body.innerHTML = '<div class="pg-empty">Section not found</div>'; return; }
  getState(id);
  var html = '<div class="pg-component-layout">' +
    '<div class="pg-preview-wrap" id="pg-preview">' + renderPreview(id) + '</div>';
  if (comp.controls.length) {
    html += '<div class="pg-controls"><div class="pg-controls-title">Properties</div>' + renderControls(id) + '</div>';
  }
  html += '</div><div class="pg-code-wrap"><div class="pg-code-bar"><span>HTML</span><button class="pg-copy-btn" onclick="copyCode()">Copy</button></div><pre class="pg-code" id="pg-code-output">' + escapeHtml(renderPreview(id)) + '</pre></div>';
  body.innerHTML = html;
}

function renderPreview(id) {
  var comp = COMPONENTS[id];
  var state = getState(id);
  var resolved = {};
  comp.controls.forEach(function(c) {
    if (c.type === 'toggle') resolved[c.prop] = state[c.prop] ? (c.cls || true) : '';
    else resolved[c.prop] = state[c.prop];
  });
  /* Pass internal state props (prefixed with _) for interactive components */
  Object.keys(state).forEach(function(k) {
    if (k.charAt(0) === '_') resolved[k] = state[k];
  });
  return comp.render(resolved);
}

function renderControls(id) {
  var comp = COMPONENTS[id];
  var state = getState(id);
  // Filter by showIf (function that returns false to hide)
  var visible = comp.controls.filter(function(c) {
    if (typeof c.showIf === 'function') {
      try { return c.showIf(state); } catch (e) { return true; }
    }
    return true;
  });
  // Group by section; controls without section fall into the first default group
  var groups = [];
  var current = { section: null, items: [] };
  groups.push(current);
  visible.forEach(function(c) {
    if (c.section && (!current.section || current.section !== c.section)) {
      current = { section: c.section, items: [] };
      groups.push(current);
    }
    current.items.push(c);
  });
  return groups.filter(function(g){ return g.items.length > 0; }).map(function(g) {
    var header = g.section ? '<div class="pg-controls-section">' + g.section + '</div>' : '';
    return header + g.items.map(function(c) {
      if (c.type === 'select') {
        var btns = c.options.map(function(o) {
          return '<button class="pg-segmented-btn' + (state[c.prop]===o.v?' active':'') + '" data-comp="' + id + '" data-prop="' + c.prop + '" data-val="' + o.v + '" onclick="setSelect(this)">' + o.l + '</button>';
        }).join('');
        return '<div class="pg-control"><label class="pg-control-label">' + c.label + '</label><div class="pg-segmented">' + btns + '</div></div>';
      }
      if (c.type === 'toggle') {
        var on = state[c.prop] ? ' on' : '';
        return '<div class="pg-control"><div class="pg-toggle" data-comp="' + id + '" data-prop="' + c.prop + '" onclick="toggleCtrl(this)"><div class="pg-toggle-track' + on + '"></div><span class="pg-toggle-label">' + c.label + '</span></div></div>';
      }
      if (c.type === 'text') {
        return '<div class="pg-control"><label class="pg-control-label">' + c.label + '</label><input type="text" value="' + state[c.prop] + '" data-comp="' + id + '" data-prop="' + c.prop + '" oninput="setTextCtrl(this)"></div>';
      }
      if (c.type === 'range') {
        return '<div class="pg-control"><label class="pg-control-label">' + c.label + '</label><input type="range" min="' + c.min + '" max="' + c.max + '" value="' + state[c.prop] + '" data-comp="' + id + '" data-prop="' + c.prop + '" oninput="setRangeCtrl(this)"><div class="pg-range-val">' + state[c.prop] + '</div></div>';
      }
      return '';
    }).join('');
  }).join('');
}

/* Refresh controls panel (used when showIf conditions change) */
function refreshControls(id) {
  var panel = document.querySelector('.pg-controls');
  if (!panel) return;
  panel.innerHTML = '<div class="pg-controls-title">Properties</div>' + renderControls(id);
}

/* ── Control handlers ── */
function setSelect(btn) {
  STATE[btn.dataset.comp][btn.dataset.prop] = btn.dataset.val;
  updatePreview(btn.dataset.comp);
  refreshControls(btn.dataset.comp);
}
function toggleCtrl(el) {
  STATE[el.dataset.comp][el.dataset.prop] = !STATE[el.dataset.comp][el.dataset.prop];
  el.querySelector('.pg-toggle-track').classList.toggle('on');
  updatePreview(el.dataset.comp);
  refreshControls(el.dataset.comp);
}
function setTextCtrl(input) {
  STATE[input.dataset.comp][input.dataset.prop] = input.value;
  updatePreview(input.dataset.comp);
}
function setRangeCtrl(input) {
  STATE[input.dataset.comp][input.dataset.prop] = input.value;
  if (input.nextElementSibling) input.nextElementSibling.textContent = input.value;
  updatePreview(input.dataset.comp);
}
function updatePreview(id) {
  var preview = document.getElementById('pg-preview');
  var code = document.getElementById('pg-code-output');
  if (preview) {
    var html = renderPreview(id);
    preview.innerHTML = html;
    if (code) code.textContent = html.trim();
  }
}
function copyCode() {
  var code = document.getElementById('pg-code-output');
  if (code) {
    navigator.clipboard.writeText(code.textContent);
    var btn = document.querySelector('.pg-copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(function(){ btn.textContent = 'Copy'; }, 1500);
  }
}
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Interactive component helpers ── */
function stepperChange(id, delta) {
  var val = parseInt(STATE[id].value || '0') + delta;
  if (val < 0) val = 0;
  STATE[id].value = String(val);
  updatePreview(id);
  var inp = document.querySelector('input[data-comp="' + id + '"][data-prop="value"]');
  if (inp) inp.value = val;
}
function stepperInput(el) {
  var id = 'input-stepper';
  var val = parseInt(el.value) || 0;
  if (val < 0) val = 0;
  STATE[id].value = String(val);
  updatePreview(id);
  var inp = document.querySelector('input[data-comp="' + id + '"][data-prop="value"]');
  if (inp) inp.value = val;
}
function paginationChange(id, delta) {
  var val = parseInt(STATE[id].page || '1') + delta;
  var max = parseInt(STATE[id].total || '20');
  if (val < 1) val = 1; if (val > max) val = max;
  STATE[id].page = String(val);
  updatePreview(id);
  var inp = document.querySelector('input[data-comp="' + id + '"][data-prop="page"]');
  if (inp) inp.value = val;
}
function paginationInput(el) {
  var id = el.dataset.comp;
  var val = parseInt(el.value) || 1;
  var max = parseInt(STATE[id].total || '20');
  if (val < 1) val = 1; if (val > max) val = max;
  STATE[id].page = String(val);
}
/* Live counter for textfield (helper counter) */
function textfieldInput(el) {
  var wrap = el.closest('.naowee-textfield');
  if (!wrap) return;
  var counter = wrap.querySelector('.naowee-helper__counter');
  if (counter) {
    var max = counter.dataset.max || '100';
    counter.textContent = el.value.length + '/' + max;
  }
}
/* Clear button handler */
function textfieldClear(btn) {
  var wrap = btn.closest('.naowee-textfield');
  if (!wrap) return;
  var input = wrap.querySelector('.naowee-textfield__input');
  if (input) {
    input.value = '';
    input.focus();
    textfieldInput(input);
  }
}
/* Interactive switch toggle */
function toggleSwitchInteractive(el, e) {
  if (e) e.preventDefault();
  if (el.classList.contains('naowee-switch--disabled')) return;
  el.classList.toggle('naowee-switch--on');
}
/* Interactive checkbox toggle */
function toggleCheckboxInteractive(el, e) {
  if (e) e.preventDefault();
  if (el.classList.contains('naowee-checkbox--disabled')) return;
  if (el.classList.contains('naowee-checkbox--indeterminate')) {
    el.classList.remove('naowee-checkbox--indeterminate');
    el.classList.add('naowee-checkbox--checked');
  } else {
    el.classList.toggle('naowee-checkbox--checked');
  }
}
/* Interactive radio toggle */
function toggleRadioInteractive(el, e) {
  if (e) e.preventDefault();
  if (el.classList.contains('naowee-radio--disabled')) return;
  el.classList.toggle('naowee-radio--selected');
}
/* Interactive searchbox collapse toggle */
function toggleSearchboxCollapse(el) {
  var box = el.closest('.naowee-searchbox');
  if (box) box.classList.toggle('naowee-searchbox--collapsed');
}
/* Interactive dropdown toggle open/close */
function dropdownToggleOpen(el, e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  var dd = el.closest('.naowee-dropdown');
  if (!dd) return;
  if (dd.classList.contains('naowee-dropdown--disabled') || dd.classList.contains('naowee-dropdown--readonly')) return;
  // Close any other open dropdown
  document.querySelectorAll('.naowee-dropdown--open').forEach(function(o) {
    if (o !== dd) o.classList.remove('naowee-dropdown--open');
  });
  dd.classList.toggle('naowee-dropdown--open');
}
function dropdownSelectOption(el, e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  var dd = el.closest('.naowee-dropdown');
  if (!dd) return;
  // Update placeholder text to the selected option
  var placeholder = dd.querySelector('.naowee-dropdown__placeholder');
  if (placeholder) placeholder.textContent = el.textContent;
  dd.classList.remove('naowee-dropdown--open');
}
/* Close dropdowns when clicking outside */
document.addEventListener('click', function(e) {
  if (!e.target.closest('.naowee-dropdown')) {
    document.querySelectorAll('.naowee-dropdown--open').forEach(function(o) {
      o.classList.remove('naowee-dropdown--open');
    });
  }
});
/* Time picker interactive toggle */
function timepickerToggle(el, e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  var tp = el.closest('.naowee-timepicker');
  if (!tp) return;
  if (tp.classList.contains('naowee-timepicker--disabled')) return;
  // Close any other open time picker
  document.querySelectorAll('.naowee-timepicker--open').forEach(function(o) {
    if (o !== tp) o.classList.remove('naowee-timepicker--open');
  });
  tp.classList.toggle('naowee-timepicker--open');
}
function timepickerSelect(el, e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  var tp = el.closest('.naowee-timepicker');
  if (!tp) return;
  var value = tp.querySelector('.naowee-timepicker__value');
  if (value) value.textContent = el.textContent;
  tp.classList.add('naowee-timepicker--has-value');
  tp.classList.remove('naowee-timepicker--open');
  // Update all options selected state
  tp.querySelectorAll('.naowee-timepicker__option').forEach(function(o) {
    o.classList.remove('naowee-timepicker__option--selected');
  });
  el.classList.add('naowee-timepicker__option--selected');
}
/* Close timepickers when clicking outside */
document.addEventListener('click', function(e) {
  if (!e.target.closest('.naowee-timepicker')) {
    document.querySelectorAll('.naowee-timepicker--open').forEach(function(o) {
      o.classList.remove('naowee-timepicker--open');
    });
  }
});
/* Carousel scroll by one slide */
function carouselScroll(btn, direction) {
  var track = btn.closest('.naowee-carousel__viewport').querySelector('.naowee-carousel__track');
  if (!track) return;
  var firstSlide = track.querySelector('.naowee-carousel__slide');
  if (!firstSlide) return;
  var slideWidth = firstSlide.offsetWidth + 12; // include gap
  track.scrollBy({ left: slideWidth * direction, behavior: 'smooth' });
}
/* Interactive menu item click */
function menuItemClick(el, e, type) {
  if (e) e.preventDefault();
  if (type === 'multiple') {
    el.classList.toggle('naowee-list-row--checked');
  } else if (type === 'single') {
    var menu = el.closest('.naowee-menu');
    if (menu) {
      menu.querySelectorAll('.naowee-list-row--selected').forEach(function(i) {
        i.classList.remove('naowee-list-row--selected');
      });
    }
    el.classList.add('naowee-list-row--selected');
  }
}
/* Interactive list row click (for checkbox/radio/pick) */
function listRowClick(el, e, type) {
  if (e) e.preventDefault();
  if (el.classList.contains('naowee-list-row--disabled')) return;
  if (type === 'checkbox') {
    el.classList.toggle('naowee-list-row--checked');
  } else if (type === 'radio') {
    var group = el.parentElement;
    if (group) {
      group.querySelectorAll('.naowee-list-row--checked').forEach(function(i) {
        i.classList.remove('naowee-list-row--checked');
      });
    }
    el.classList.add('naowee-list-row--checked');
  } else if (type === 'pick') {
    var wrap = el.parentElement;
    if (wrap) {
      wrap.querySelectorAll('.naowee-list-row--selected').forEach(function(i) {
        i.classList.remove('naowee-list-row--selected');
      });
    }
    el.classList.add('naowee-list-row--selected');
  }
}
/* Render a list-row element (reusable for list-row component and menu items) */
window.renderListRow = function(s, opts) {
  opts = opts || {};
  var type = s.rowType || opts.type || 'default';
  var iconStar = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
  var iconChevron = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
  var iconCheck = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  var iconThumb = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';

  var cls = ['naowee-list-row'];
  cls.push('naowee-list-row--' + type);
  if (s.size) cls.push('naowee-list-row--' + s.size);
  if (s.state === 'hover') cls.push('is-hover');
  if (s.state === 'disabled') cls.push('naowee-list-row--disabled');
  if (s.showDivider) cls.push('naowee-list-row--divider');
  if (s.selected && (type === 'checkbox' || type === 'radio')) cls.push('naowee-list-row--checked');
  if (s.selected && type === 'pick') cls.push('naowee-list-row--selected');
  if (s.media === 'thumbnail' || s.media === 'avatar') cls.push('naowee-list-row--has-thumb');
  if (type === 'checkbox' || type === 'radio') cls.push('naowee-list-row--has-control');
  if (s.showDescription) cls.push('naowee-list-row--has-desc');

  // Control (checkbox or radio)
  var control = '';
  if (type === 'checkbox') {
    control = '<span class="naowee-list-row__control"><span class="naowee-list-row__checkbox">' + iconCheck + '</span></span>';
  } else if (type === 'radio') {
    control = '<span class="naowee-list-row__control"><span class="naowee-list-row__radio"></span></span>';
  }

  // Media (left)
  var media = '';
  if (s.media === 'icon') media = '<span class="naowee-list-row__media naowee-list-row__media--icon">' + iconStar + '</span>';
  else if (s.media === 'thumbnail') media = '<span class="naowee-list-row__media naowee-list-row__media--thumbnail">' + iconThumb + '</span>';
  else if (s.media === 'avatar') {
    var initials = opts.initials || 'NA';
    media = '<span class="naowee-list-row__media naowee-list-row__media--avatar">' + initials + '</span>';
  }

  // Content
  var topRight = s.showTopRight ? '<span class="naowee-list-row__top-right">' + (s.topRight || '') + '</span>' : '';
  var bottomRight = (s.showDescription && s.showBottomRight) ? '<span class="naowee-list-row__bottom-right">' + (s.bottomRight || '') + '</span>' : '';
  var desc = s.showDescription ? ('<div class="naowee-list-row__desc-row"><span class="naowee-list-row__description">' + (s.description || 'Description') + '</span>' + bottomRight + '</div>') : '';
  var bottomSlot = s.showBottomSlot ? '<div class="naowee-list-row__bottom-slot">Bottom slot</div>' : '';
  var content = '<div class="naowee-list-row__content">' +
    '<div class="naowee-list-row__title-row">' +
      '<span class="naowee-list-row__title">' + (s.title || 'Title') + '</span>' +
      topRight +
    '</div>' +
    desc +
    bottomSlot +
  '</div>';

  // Chevron
  var chevron = type === 'chevron' ? '<span class="naowee-list-row__chevron">' + iconChevron + '</span>' : '';

  // Click handler for interactive types
  var onclick = '';
  if (type === 'checkbox' || type === 'radio' || type === 'pick') {
    onclick = ' onclick="listRowClick(this, event, \'' + type + '\')"';
  }

  return '<div class="' + cls.join(' ') + '"' + onclick + '>' + control + media + content + chevron + '</div>';
};
/* Date picker view toggle: days → months → years → days */
function calendarToggleView() {
  var id = 'date-picker';
  var st = STATE[id];
  if (!st._calView || st._calView === 'days') st._calView = 'months';
  else if (st._calView === 'months') st._calView = 'years';
  else st._calView = 'days';
  updatePreview(id);
}
function calendarSelectMonth(m) {
  var id = 'date-picker';
  STATE[id]._month = m;
  STATE[id]._calView = 'days';
  updatePreview(id);
}
function calendarSelectYear(y) {
  var id = 'date-picker';
  STATE[id]._year = y;
  STATE[id]._calView = 'months';
  updatePreview(id);
}
function calendarNav(delta) {
  var id = 'date-picker';
  var st = STATE[id];
  var m = st._month || 5; /* June = 5 (0-indexed) */
  var y = st._year || 2025;
  if (!st._calView || st._calView === 'days') {
    m += delta;
    if (m > 11) { m = 0; y++; }
    if (m < 0) { m = 11; y--; }
  } else if (st._calView === 'years') {
    y += delta * 4;
  }
  st._month = m; st._year = y;
  updatePreview(id);
}
/* Date picker interactive click */
function calendarDayClick(el) {
  var id = 'date-picker';
  var day = parseInt(el.textContent);
  if (isNaN(day) || el.classList.contains('naowee-datepicker__day--other-month')) return;
  var sel = STATE[id].selection || 'single';
  if (sel === 'single') {
    STATE[id]._selectedDay = day;
    updatePreview(id);
  } else if (sel === 'range') {
    if (!STATE[id]._rangeStart || STATE[id]._rangeEnd) {
      STATE[id]._rangeStart = day; STATE[id]._rangeEnd = null;
    } else {
      if (day > STATE[id]._rangeStart) STATE[id]._rangeEnd = day;
      else { STATE[id]._rangeEnd = STATE[id]._rangeStart; STATE[id]._rangeStart = day; }
    }
    updatePreview(id);
  } else if (sel === 'multiple') {
    if (!STATE[id]._multiDays) STATE[id]._multiDays = [];
    var idx = STATE[id]._multiDays.indexOf(day);
    if (idx === -1) STATE[id]._multiDays.push(day);
    else STATE[id]._multiDays.splice(idx, 1);
    updatePreview(id);
  }
}

/* ═══════════════════════════════════════════════════════════════
   FOUNDATION RENDERERS
   ═══════════════════════════════════════════════════════════════ */
function renderFoundation(id) {
  var renderers = { colors:renderColors, icons:renderIcons, typography:renderTypography, spacing:renderSpacing, sizing:renderSizing, shadows:renderShadows, 'border-radius':renderRadius };
  return '<div class="pg-foundation">' + (renderers[id] || function(){return '';})() + '</div>';
}

function renderColors() {
  var html = '<h3>Core Palettes</h3>';
  PALETTES.forEach(function(p) {
    html += '<div class="pg-palette"><div class="pg-palette-name">' + p.name + '</div><div class="pg-swatches">';
    p.steps.forEach(function(step) {
      var varName = '--naowee-color-' + p.prefix + '-' + step;
      var isLight = step <= p.lightUntil;
      html += '<div class="pg-swatch" style="background:var(' + varName + ')" ' + (isLight?'data-light':'data-dark') + '><span>' + step + '</span><div class="pg-swatch-tip">' + varName + '</div></div>';
    });
    html += '</div></div>';
  });
  html += '<div class="pg-palette"><div class="pg-palette-name">Accents</div><div class="pg-swatches">' +
    '<div class="pg-swatch" style="background:var(--naowee-color-turquoise-100)" data-light><span>T-100</span><div class="pg-swatch-tip">--naowee-color-turquoise-100</div></div>' +
    '<div class="pg-swatch" style="background:var(--naowee-color-turquoise-200)" data-dark><span>T-200</span><div class="pg-swatch-tip">--naowee-color-turquoise-200</div></div>' +
    '<div class="pg-swatch" style="background:var(--naowee-color-turquoise-300)" data-dark><span>T-300</span><div class="pg-swatch-tip">--naowee-color-turquoise-300</div></div>' +
    '<div class="pg-swatch" style="background:var(--naowee-color-violet-100)" data-light><span>V-100</span><div class="pg-swatch-tip">--naowee-color-violet-100</div></div>' +
    '<div class="pg-swatch" style="background:var(--naowee-color-violet-200)" data-dark><span>V-200</span><div class="pg-swatch-tip">--naowee-color-violet-200</div></div>' +
    '<div class="pg-swatch" style="background:var(--naowee-color-violet-300)" data-dark><span>V-300</span><div class="pg-swatch-tip">--naowee-color-violet-300</div></div>' +
  '</div></div>';

  html += '<h3>Semantic Colors</h3><div class="pg-semantic-grid">';
  SEMANTIC_COLORS.forEach(function(c) {
    html += '<div class="pg-semantic-item"><div class="pg-semantic-dot" style="background:var(' + c.v + ')"></div><span class="pg-semantic-label" title="' + c.v + '">' + c.label + '</span></div>';
  });
  html += '</div>';
  return html;
}

function renderIcons() {
  var cats = {};
  Object.keys(NAOWEE_ICONS).forEach(function(name) {
    var icon = NAOWEE_ICONS[name];
    if (!cats[icon.cat]) cats[icon.cat] = [];
    cats[icon.cat].push(name);
  });
  var html = '<div style="margin-bottom:16px;display:flex;gap:8px;align-items:center"><span style="font-size:12px;color:#646587">Iconos: <strong style="color:#282834">' + Object.keys(NAOWEE_ICONS).length + '</strong> | Categorias: <strong style="color:#282834">' + Object.keys(cats).length + '</strong></span></div>';
  Object.keys(cats).forEach(function(cat) {
    html += '<h3>' + cat + '</h3><div class="pg-icon-grid">';
    cats[cat].forEach(function(name) {
      html += '<div class="pg-icon-card" title="' + name + '\nTags: ' + NAOWEE_ICONS[name].tags + '" onclick="copyIconName(\'' + name + '\')">' +
        '<div class="pg-icon-preview">' + naoIcon(name, 24) + '</div>' +
        '<span class="pg-icon-name">' + name + '</span></div>';
    });
    html += '</div>';
  });
  html += '<h3>Sizes</h3><div style="display:flex;gap:24px;align-items:flex-end">';
  [12,16,20,24,32,48].forEach(function(s) {
    html += '<div style="text-align:center">' + naoIcon('home', s) + '<div style="font-size:10px;color:#9C9EBF;margin-top:4px">' + s + 'px</div></div>';
  });
  html += '</div>';
  return html;
}
function copyIconName(name) {
  navigator.clipboard.writeText("naoIcon('" + name + "')");
  var title = document.querySelector('.pg-topbar-title');
  var prev = title.textContent;
  title.textContent = 'Copied: ' + name;
  setTimeout(function(){ title.textContent = prev; }, 1500);
}

function renderTypography() {
  var html = '<h3>Type Scale</h3>';
  TYPE_SIZES.forEach(function(t) {
    html += '<div class="pg-type-row"><div class="pg-type-meta">' + t.name + '<br>' + t.size + 'px / ' + t.weight + '</div><div class="pg-type-sample" style="font-size:' + t.size + 'px;font-weight:' + t.weight + ';line-height:' + t.lh + 'px">The quick brown fox jumps</div></div>';
  });
  html += '<h3>Font Weights</h3>';
  [{w:400,n:'Regular'},{w:500,n:'Medium'},{w:600,n:'Semibold'},{w:700,n:'Bold'}].forEach(function(f) {
    html += '<div class="pg-type-row"><div class="pg-type-meta">' + f.n + ' (' + f.w + ')</div><div class="pg-type-sample" style="font-size:16px;font-weight:' + f.w + ';line-height:24px">The quick brown fox jumps over the lazy dog</div></div>';
  });
  return html;
}

function renderSpacing() {
  var html = '<h3>Padding / Gap Scale</h3>';
  SPACING.forEach(function(s) {
    var pct = (s.px / 88 * 100).toFixed(1);
    html += '<div class="pg-space-row"><div class="pg-space-label">' + s.name + '</div><div class="pg-space-bar" style="width:' + Math.max(pct,1) + '%"></div><div class="pg-space-val">' + s.px + 'px</div></div>';
  });
  return html;
}

function renderSizing() {
  var html = '';
  Object.entries(SIZING).forEach(function(entry) {
    var group = entry[0], items = entry[1];
    html += '<h3>' + group.charAt(0).toUpperCase() + group.slice(1) + ' Sizes</h3><div style="display:flex;gap:12px;align-items:flex-end;margin-bottom:16px">';
    items.forEach(function(i) {
      html += '<div style="text-align:center"><div style="width:' + Math.max(i.px,40) + 'px;height:' + i.px + 'px;background:#FFEDC7;border:2px solid #FF7500;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#D74009">' + i.px + '</div><div style="font-size:10px;color:#9C9EBF;margin-top:4px">' + i.name + '</div></div>';
    });
    html += '</div>';
  });
  return html;
}

function renderShadows() {
  var html = '<h3>Shadow Tokens</h3><div class="pg-shadow-grid">';
  SHADOWS.forEach(function(s) {
    html += '<div class="pg-shadow-card" style="box-shadow:' + s.val + '"><strong>' + s.name + '</strong><br><span style="font-size:10px;color:#9C9EBF">' + s.v + '</span></div>';
  });
  return html + '</div>';
}

function renderRadius() {
  var html = '<h3>Border Radius Scale</h3><div class="pg-radius-grid">';
  RADII.forEach(function(r) {
    var rad = r.px === '9999px' ? '50%' : r.px;
    html += '<div class="pg-radius-item" style="border-radius:' + rad + '">' + r.name + '<br>' + r.px + '</div>';
  });
  return html + '</div>';
}

/* ── INIT ── */
buildSidebar();
window.addEventListener('hashchange', onHashChange);
onHashChange();
</script>
