<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tabla de inversión · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/naowee-tech/naowee-design-system@v1.8.0/dist/design-system.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/pages.css?v=20260510c">
</head>
<body>
<div class="shell">
  <div id="sidebarRoot"></div>
  <div class="main">
    <header class="top-header" id="topHeader"></header>
    <div class="page" id="pageContent"></div>
  </div>
</div>
<div id="demoRoleSwitcherRoot"></div>

<script type="module">
  import ProjectData from '../shared/data.js';
  import { mountShell } from '../shared/shell.js';
  import { formatoMoneda, formatoFecha } from '../shared/states.js';
  ProjectData.setPerfil('admin');
  mountShell({ activeId: 'inversion' });

  const enInversion = ProjectData.getProyectos(p => p.estado === 'en_inversion');
  const conConcepto = ProjectData.getProyectos(p => p.estado === 'concepto_favorable');
  const totalInvertido = enInversion.reduce((s,p) => s + (p.inversion?.montoAprobado || 0), 0);
  const totalSolicitado = enInversion.reduce((s,p) => s + (p.montoSolicitado || 0), 0);
  const ahorro = totalSolicitado - totalInvertido;

  /* Formato abreviado tipo $4.8 MM para los KPIs */
  const formatoMonedaAbrev = (n) => {
    if (!n) return '$0';
    if (n >= 1e12) return `$${(n / 1e12).toFixed(1).replace(/\.0$/, '')} B`;
    if (n >= 1e9)  return `$${(n / 1e9).toFixed(1).replace(/\.0$/, '')} MM`;
    if (n >= 1e6)  return `$${(n / 1e6).toFixed(1).replace(/\.0$/, '')} M`;
    if (n >= 1e3)  return `$${(n / 1e3).toFixed(0)} K`;
    return `$${n}`;
  };

  const ICONS = {
    back:  '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>',
    money: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="20 6 9 17 4 12"/></svg>',
    pend:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
    delta: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="17 13 12 18 7 13"/><line x1="12" y1="18" x2="12" y2="6"/></svg>',
    deltaUp: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="17 11 12 6 7 11"/><line x1="12" y1="6" x2="12" y2="18"/></svg>'
  };

  document.getElementById('pageContent').innerHTML = `
    <div class="page-fade-in">
      <a class="naowee-btn naowee-btn--mute naowee-btn--small back-btn" href="dashboard.html" style="margin-bottom:14px">${ICONS.back}Volver al panel</a>
      <div class="naowee-page-header naowee-page-header--centered">
        <div class="naowee-page-header__main">
          <h1>Tabla de inversión</h1>
          <p>Sumatoria de los proyectos activados como inversión del Estado. Esta vista es informativa — la ejecución de presupuesto vendrá en alcance posterior.</p>
        </div>
      </div>

      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-card__top">
            <span class="kpi-card__lbl">Inversión total activada</span>
            <div class="kpi-card__ico kpi-card__ico--positive">${ICONS.money}</div>
          </div>
          <div class="kpi-card__val" title="${formatoMoneda(totalInvertido)}" style="color:var(--green)">${formatoMonedaAbrev(totalInvertido)}<small>COP</small></div>
          <div class="kpi-card__foot">
            <span class="kpi-trend kpi-trend--up">${enInversion.length} proyecto${enInversion.length===1?'':'s'}</span>
            <span>vigente${enInversion.length===1?'':'s'}</span>
          </div>
        </div>

        <div class="kpi-card">
          <div class="kpi-card__top">
            <span class="kpi-card__lbl">Listos para activar</span>
            <div class="kpi-card__ico" style="background:#eef5ff;color:#1f78d1">${ICONS.check}</div>
          </div>
          <div class="kpi-card__val">${conConcepto.length}</div>
          <div class="kpi-card__foot">
            <span class="kpi-trend kpi-trend--flat">Concepto favorable</span>
          </div>
        </div>

        <div class="kpi-card">
          <div class="kpi-card__top">
            <span class="kpi-card__lbl">Solicitado total</span>
            <div class="kpi-card__ico kpi-card__ico--caution">${ICONS.pend}</div>
          </div>
          <div class="kpi-card__val" title="${formatoMoneda(totalSolicitado)}">${formatoMonedaAbrev(totalSolicitado)}<small>COP</small></div>
          <div class="kpi-card__foot">
            <span class="kpi-trend kpi-trend--flat">Antes de aprobación</span>
          </div>
        </div>

        <div class="kpi-card">
          <div class="kpi-card__top">
            <span class="kpi-card__lbl">Diferencia ajustada</span>
            <div class="kpi-card__ico" style="background:${ahorro >= 0 ? '#e6f4e7' : '#fff0ee'};color:${ahorro >= 0 ? '#1f8923' : '#c01818'}">${ahorro >= 0 ? ICONS.delta : ICONS.deltaUp}</div>
          </div>
          <div class="kpi-card__val" title="${formatoMoneda(Math.abs(ahorro))}" style="color:${ahorro >= 0 ? 'var(--green)' : '#c01818'}">${formatoMonedaAbrev(Math.abs(ahorro))}</div>
          <div class="kpi-card__foot">
            <span class="kpi-trend ${ahorro >= 0 ? 'kpi-trend--up' : 'kpi-trend--down'}">${ahorro >= 0 ? 'Ahorro' : 'Sobre-asignación'}</span>
          </div>
        </div>
      </div>

      ${conConcepto.length > 0 ? `
        <div class="naowee-message naowee-message--informative" role="status" style="margin:24px 0">
          <div class="naowee-message__header">
            <span class="naowee-message__icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="#fff" stroke-width="1.4"/><path d="M8 7v4M8 4.5v.05" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg></span>
            <span class="naowee-message__title">${conConcepto.length} proyecto${conConcepto.length>1?'s':''} con concepto favorable ${conConcepto.length>1?'esperan':'espera'} activación</span>
          </div>
          <div class="naowee-message__text">Activar inversión enlaza el proyecto al BPIN, asigna centro de costo y (si es infraestructura) habilita el registro SUID del escenario.</div>
          <a class="naowee-btn naowee-btn--loud naowee-message__action" href="proyectos.html">Revisar →</a>
        </div>
      ` : ''}

      <article class="naowee-card panel-card" style="height:auto">
        <div class="panel-head">
          <div>
            <h3>Proyectos en inversión</h3>
            <div class="sub">Bienio 2025-2026 · ${enInversion.length} proyecto${enInversion.length===1?'':'s'} activo${enInversion.length===1?'':'s'}</div>
          </div>
          <a href="proyectos.html" class="naowee-btn naowee-btn--mute naowee-btn--small">Ver todos los proyectos</a>
        </div>
        <div class="panel-card__body" style="padding-bottom:14px">
          ${enInversion.length === 0 ? `
            <div class="naowee-empty-state" style="padding:40px 20px">
              <div class="naowee-empty-state__msg">Aún no hay proyectos activados como inversión.</div>
            </div>
          ` : `
            <table class="dash-table">
              <thead>
                <tr>
                  <th>BPIN</th>
                  <th>Proyecto</th>
                  <th>Municipio</th>
                  <th class="numeric">Presupuesto</th>
                  <th class="numeric">Aprobado</th>
                  <th class="numeric">Activado</th>
                  <th>SUID</th>
                </tr>
              </thead>
              <tbody>
                ${enInversion.map(p => `
                  <tr onclick="location.href='proyecto-detalle.html?id=${p.idUnico}'">
                    <td><span class="code-cell">${p.inversion?.bpin || '—'}</span></td>
                    <td class="name-cell">
                      <div class="name-cell__inner"><span class="name-cell__title" title="${p.nombre}">${p.nombre}</span></div>
                      <div class="meta-line">${p.inversion?.centroCosto || '—'}</div>
                    </td>
                    <td>${p.municipio}<div class="meta-line" style="margin-top:2px">${p.departamento || ''}</div></td>
                    <td class="numeric" style="font-weight:600">${formatoMoneda(p.presupuesto)}</td>
                    <td class="numeric" style="font-weight:600;color:var(--green)">${formatoMoneda(p.inversion?.montoAprobado)}</td>
                    <td class="numeric" style="color:var(--text-secondary);font-weight:500;font-size:12px;white-space:nowrap">${formatoFecha(p.inversion?.activadaEn)}</td>
                    <td>${p.inversion?.suidEscenario ? `<span class="naowee-badge naowee-badge--informative naowee-badge--quiet">${p.inversion.suidEscenario}</span>` : '—'}</td>
                  </tr>
                `).join('')}
              </tbody>
              <tfoot>
                <tr>
                  <td colspan="4" style="text-align:right">Sumatoria total de inversión:</td>
                  <td class="numeric" style="color:var(--green);font-size:14px">${formatoMoneda(totalInvertido)}</td>
                  <td colspan="2"></td>
                </tr>
              </tfoot>
            </table>
          `}
        </div>
      </article>
    </div>
  `;
</script>
</body>
</html>
