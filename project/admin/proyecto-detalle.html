<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Proyecto · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/naowee-tech/naowee-design-system@v1.8.0/dist/design-system.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/pages.css?v=20260509t">
</head>
<body>
<div class="shell">
  <div id="sidebarRoot"></div>
  <div class="main">
    <header class="top-header" id="topHeader"></header>
    <div class="page" id="pageContent"></div>
  </div>
</div>
<div id="demoRoleSwitcherRoot"></div>

<script type="module">
  import ProjectData from '../shared/data.js';
  import { mountShell } from '../shared/shell.js';
  import { ESTADOS_POSTULACION, ESTADOS_AREA, formatoMoneda, formatoFecha } from '../shared/states.js';
  ProjectData.setPerfil('admin');
  mountShell({ activeId: 'proyectos' });

  const id = new URLSearchParams(location.search).get('id');
  const p = ProjectData.getProyecto(id);

  if (!p) {
    document.getElementById('pageContent').innerHTML = `<div class="naowee-empty-state"><div class="naowee-empty-state__title">Proyecto no encontrado</div><a class="naowee-btn naowee-btn--quiet" href="proyectos.html">Volver</a></div>`;
  } else {
    const est = ESTADOS_POSTULACION[p.estado];
    const puedeActivar = p.estado === 'concepto_favorable';
    const yaInversion = p.estado === 'en_inversion';

    /* Smart back button — respeta el contexto de origen.
       - Desde convocatoria-detalle: vuelve a esa convocatoria específica
       - Desde dashboard: vuelve al panel
       - Default: lista de proyectos */
    const ref = document.referrer;
    let backHref, backLabel;
    if (ref.includes('convocatoria-detalle.html') && p.convocatoriaId) {
      backHref = `convocatoria-detalle.html?id=${p.convocatoriaId}`;
      backLabel = 'Volver a la convocatoria';
    } else if (ref.includes('dashboard.html')) {
      backHref = 'dashboard.html';
      backLabel = 'Volver al panel';
    } else {
      backHref = 'proyectos.html';
      backLabel = 'Volver a proyectos';
    }

    document.getElementById('pageContent').innerHTML = `
      <div class="page-fade-in">
        <a class="naowee-btn naowee-btn--mute naowee-btn--small back-btn" href="${backHref}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          ${backLabel}
        </a>

        <div class="project-hero">
          <div>
            <div class="project-hero__rad">${p.radicado || p.idUnico}</div>
            <h1 class="project-hero__title">${p.nombre}</h1>
            <div class="project-hero__meta">
              <span>${p.municipio}, ${p.departamento || ''}</span>
              <span>${p.formuladora?.nombre || ''}</span>
              <span>Postulado: ${formatoFecha(p.fechaPostulacion)}</span>
              <span>${p.tipoSolicitud || ''} · ${p.fase || ''}</span>
            </div>
            <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
              <span class="naowee-badge naowee-badge--${est.color} naowee-badge--quiet"><span class="naowee-badge__dot"></span>${est.label}</span>
              ${p.priorizado ? '<span class="naowee-badge naowee-badge--accent naowee-badge--quiet">Proyecto priorizado</span>' : ''}
              ${p.tipo === 'infraestructura' ? '<span class="naowee-badge naowee-badge--informative naowee-badge--quiet">Infraestructura</span>' : ''}
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--text-secondary);text-transform:uppercase">Presupuesto del proyecto</div>
            <div class="project-hero__amount">${formatoMoneda(p.presupuesto)}</div>
            <div style="font-size:12px;color:var(--text-secondary);margin-top:4px">Solicitado: ${formatoMoneda(p.montoSolicitado)} · Contrapartida: ${formatoMoneda(p.contrapartida)}</div>
            ${puedeActivar ? `<a class="naowee-btn naowee-btn--loud naowee-btn--success" href="inversion-crear.html?id=${p.idUnico}" style="margin-top:14px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="20 6 9 17 4 12"/></svg> Activar inversión</a>` : ''}
            ${yaInversion ? `<div class="naowee-message naowee-message--positive" role="status" style="margin-top:14px"><div class="naowee-message__header"><span class="naowee-message__icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="naowee-message__title">En inversión</span></div><div class="naowee-message__text">${formatoMoneda(p.inversion?.montoAprobado)} · BPIN ${p.inversion?.bpin}</div></div>` : ''}
          </div>
        </div>

        <div class="naowee-card proj-tabs-card">
          <div class="naowee-tabs naowee-tabs--animated" role="tablist">
            <button class="naowee-tab naowee-tab--selected" data-tab="datos" role="tab" type="button">Datos del proyecto</button>
            <button class="naowee-tab" data-tab="historial" role="tab" type="button">Historial</button>
            <span class="naowee-tabs__indicator"></span>
          </div>

          <!-- Tab: Datos -->
          <div class="proj-tab-panel" data-panel="datos">
            <dl class="proj-data">
              <div><dt>Dirección</dt><dd>${p.direccionPredio || '—'}</dd></div>
              <div><dt>Cofinanciación</dt><dd>${(p.cofinanciacion||[]).map(f=>`<span class="naowee-badge naowee-badge--informative naowee-badge--quiet" style="margin-right:4px">${f}</span>`).join('') || '—'}</dd></div>
              <div><dt>Representante legal</dt><dd><strong>${p.representante?.nombre || '—'}</strong><div style="color:var(--text-secondary);font-size:12px;font-weight:400">${p.representante?.documento || ''} · ${p.representante?.cargo || ''}</div></dd></div>
              <div><dt>Convocatoria</dt><dd style="font-weight:600">${p.convocatoriaId}</dd></div>
              <div><dt>Tipo</dt><dd>${p.tipoSolicitud || '—'}</dd></div>
              <div><dt>Fase</dt><dd>${p.fase || '—'}</dd></div>
            </dl>
          </div>

          <!-- Tab: Historial (timeline patrón escenario-09) -->
          <div class="proj-tab-panel" data-panel="historial" hidden>
            ${(() => {
              const events = (p.historial || []).slice().reverse();
              if (events.length === 0) return '<div class="naowee-empty-state"><div class="naowee-empty-state__msg">Sin eventos registrados.</div></div>';
              const dotColor = (h) => h.actor === 'sistema' ? 'gray'
                : h.actor === 'revisor' ? 'orange'
                : h.actor === 'municipio' ? 'blue'
                : h.estado === 'concepto_favorable' || h.estado === 'en_inversion' ? 'green'
                : 'orange';
              const dotIcon = (h) => h.actor === 'sistema'
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
              return `
                <div class="hist-summary">
                  <span>${events.length} evento${events.length === 1 ? '' : 's'} en el historial</span>
                </div>
                <div class="timeline">
                  ${events.map(h => `
                    <div class="timeline-item">
                      <div class="timeline-dot ${dotColor(h)}">${dotIcon(h)}</div>
                      <div class="timeline-content">
                        <div class="timeline-title">${h.evento}</div>
                        ${h.detalle ? `<div class="timeline-desc">${h.detalle}</div>` : ''}
                        <div class="timeline-date">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
                          ${formatoFecha(h.ts, true)} · Por ${h.actor}
                        </div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              `;
            })()}
          </div>
        </div>

        ${p.docsTecnica ? `
          <div class="naowee-card" style="margin-top:20px">
            <div class="naowee-card__header"><div class="naowee-card__title">Áreas técnicas</div><div class="naowee-card__subtitle">Estado por área de revisión</div></div>
            <div class="naowee-card__body">
              <div class="area-grid">
                ${p.docsTecnica.areas.map(a => {
                  const e = ESTADOS_AREA[a.estado];
                  const pct = a.items > 0 ? (a.aprobados / a.items * 100) : 0;
                  return `
                    <div class="area-card">
                      <div class="area-card__head">
                        <div class="area-card__title">${a.nombre}</div>
                        <span class="naowee-badge naowee-badge--${e.color} naowee-badge--quiet">${e.label}</span>
                      </div>
                      <div class="area-card__progress"><span style="width:${pct}%"></span></div>
                      <div class="area-card__stats"><span>${a.aprobados} de ${a.items} ítems</span><span>${Math.round(pct)}%</span></div>
                      <div class="area-card__revisor">${a.revisor || 'Sin asignar'}</div>
                    </div>`;
                }).join('')}
              </div>
            </div>
          </div>
        ` : ''}
      </div>
    `;

    /* Tabs interaction (mover indicator + cambiar panel) */
    const tabsEl = document.querySelector('.naowee-tabs');
    const indicator = tabsEl.querySelector('.naowee-tabs__indicator');
    const positionIndicator = (tab) => {
      const r = tab.getBoundingClientRect();
      const parent = tabsEl.getBoundingClientRect();
      indicator.style.width = r.width + 'px';
      indicator.style.transform = `translateX(${r.left - parent.left}px)`;
    };
    const initial = tabsEl.querySelector('.naowee-tab--selected');
    if (initial) requestAnimationFrame(() => positionIndicator(initial));
    tabsEl.querySelectorAll('.naowee-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const key = tab.dataset.tab;
        tabsEl.querySelectorAll('.naowee-tab').forEach(t => t.classList.toggle('naowee-tab--selected', t === tab));
        document.querySelectorAll('.proj-tab-panel').forEach(p => p.hidden = p.dataset.panel !== key);
        positionIndicator(tab);
      });
    });
  }
</script>
</body>
</html>
