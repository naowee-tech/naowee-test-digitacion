<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Registro SUID de Escenario · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/naowee-tech/naowee-design-system@v1.8.0/dist/design-system.css">
<link rel="stylesheet" href="../shared/shell.css?v=20260519a">
<link rel="stylesheet" href="../shared/pages.css?v=20260519g">
</head>
<body>
<div class="shell">
  <div id="sidebarRoot"></div>
  <div class="main">
    <header class="top-header" id="topHeader"></header>
    <div class="page" id="pageContent"></div>
  </div>
</div>
<div id="demoRoleSwitcherRoot"></div>

<script type="module">
  /*
   * Registro SUID — LAUNCHER del modal canónico.
   *
   * Doug 17/05/2026: el formulario inline de 9 secciones se reemplazó
   * por modal-suid.js (wizard 8 pasos con DS Naowee canonical) — mismo
   * patrón que municipio/postular.html y el wizard de escenarios oficial.
   *
   * Esta página solo:
   *   - Monta el shell con sidebar admin
   *   - Lee ?id=X param
   *   - Abre el modal automáticamente
   *   - Si el user cierra sin completar → fallback con CTA reabrir
   */
  import ProjectData from '../shared/data.js';
  import { mountShell } from '../shared/shell.js?v=20260519d';
  import { openSuidModal } from '../shared/modal-suid.js?v=20260517d';

  ProjectData.setPerfil('admin');
  mountShell({ activeId: 'inversion' });

  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const p = id ? ProjectData.getProyecto(id) : null;
  const pageContent = document.getElementById('pageContent');

  if (!p) {
    pageContent.innerHTML = `
      <div class="page-fade-in" style="display:flex;align-items:center;justify-content:center;min-height:60vh;padding:40px 20px">
        <div class="naowee-empty-state" style="max-width:480px;text-align:center">
          <div class="naowee-empty-state__title" style="font-size:18px;font-weight:700;margin-bottom:6px">Proyecto no encontrado</div>
          <div class="naowee-empty-state__msg" style="color:var(--text-secondary);margin-bottom:18px">El identificador del proyecto no existe en el sistema.</div>
          <a class="naowee-btn naowee-btn--mute" href="inversion.html">Volver a inversión</a>
        </div>
      </div>
    `;
  } else {
    /* Empty-state visible debajo del modal — si el user cierra, se ve
       este placeholder con CTA para reabrir o volver a la tabla. */
    const suidCode = p.inversion?.suidEscenario
      || p.registroSuid?.codigo
      || `SUID-${(p.departamento || 'COL').slice(0, 3).toUpperCase()}-${(p.idUnico || '').replace(/[^0-9]/g, '').slice(0, 6)}`;
    const yaCompleto = p.registroSuid?.estado === 'completo';

    pageContent.innerHTML = `
      <div class="page-fade-in" style="display:flex;align-items:center;justify-content:center;min-height:60vh;padding:40px 20px">
        <div class="naowee-empty-state" style="max-width:520px;text-align:center">
          <div class="naowee-empty-state__icon" style="margin:0 auto 16px;width:60px;height:60px;background:${yaCompleto ? 'var(--green-bg,#e6f4e7)' : 'var(--orange-bg,#fff3e6)'};color:${yaCompleto ? 'var(--green,#15803d)' : 'var(--accent,#d74009)'};border-radius:50%;display:flex;align-items:center;justify-content:center">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <div class="naowee-empty-state__title" style="font-size:18px;font-weight:700;margin-bottom:6px">Registro SUID del escenario</div>
          <div class="naowee-empty-state__msg" style="color:var(--text-secondary);margin-bottom:8px"><strong>${p.nombre}</strong> · ${p.municipio}${p.departamento ? `, ${p.departamento}` : ''}</div>
          <div class="naowee-empty-state__msg" style="color:var(--text-secondary);margin-bottom:18px">
            <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:${yaCompleto ? 'var(--green,#15803d)' : 'var(--accent,#d74009)'}">${suidCode}</span>
            · ${yaCompleto ? 'Ya inventariado · puedes editar' : 'Pendiente · pre-validación + 3 pasos del escenario'}
          </div>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            <button type="button" class="naowee-btn naowee-btn--loud" id="btnAbrirSuid">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="20 6 9 17 4 12"/></svg>
              ${yaCompleto ? 'Editar registro' : 'Iniciar diligenciamiento'}
            </button>
            <a class="naowee-btn naowee-btn--mute" href="inversion.html">Volver a inversión</a>
          </div>
        </div>
      </div>
    `;

    function abrir() {
      openSuidModal({
        proyectoId: id,
        onCompleto: () => {
          /* Reload tras completar para mostrar el badge "Ya inventariado" */
          setTimeout(() => window.location.reload(), 800);
        }
      });
    }

    /* Auto-open el modal al cargar */
    setTimeout(() => abrir(), 80);

    /* Botón fallback si el user cierra sin completar */
    document.getElementById('btnAbrirSuid')?.addEventListener('click', abrir);
  }
</script>
</body>
</html>
