<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Proyecto · Municipio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/naowee-tech/naowee-design-system@v1.8.0/dist/design-system.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/pages.css?v=20260509t">
</head>
<body>
<div class="shell">
  <div id="sidebarRoot"></div>
  <div class="main">
    <header class="top-header" id="topHeader"></header>
    <div class="page" id="pageContent"></div>
  </div>
</div>
<div id="demoRoleSwitcherRoot"></div>

<script type="module">
  import ProjectData from '../shared/data.js';
  import { mountShell } from '../shared/shell.js';
  import { ESTADOS_POSTULACION, formatoMoneda, formatoFecha, diasRestantes } from '../shared/states.js';
  ProjectData.setPerfil('municipio');
  mountShell({ activeId: 'mis-proyectos' });

  const id = new URLSearchParams(location.search).get('id');
  const isNuevo = new URLSearchParams(location.search).get('nuevo') === '1';
  const p = ProjectData.getProyecto(id);

  if (!p) {
    document.getElementById('pageContent').innerHTML = `<div class="naowee-empty-state"><div class="naowee-empty-state__title">Proyecto no encontrado</div><a class="naowee-btn naowee-btn--quiet" href="proyectos.html">Volver</a></div>`;
  } else {
    const est = ESTADOS_POSTULACION[p.estado];
    const dias = p.estado === 'en_revision' ? diasRestantes(p.fechaInicioRevision || p.fechaPostulacion)
      : p.estado === 'devuelta_subsanacion' ? diasRestantes(p.fechaDevolucion) : null;

    document.getElementById('pageContent').innerHTML = `
      <div class="page-fade-in">
        <a class="naowee-btn naowee-btn--mute naowee-btn--small back-btn" href="dashboard.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Volver a Mi panel</a>
          ${isNuevo ? `
          <div class="naowee-message naowee-message--positive" role="status">
            <div class="naowee-message__header">
              <span class="naowee-message__icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              <span class="naowee-message__title">¡Postulación enviada!</span>
            </div>
            <div class="naowee-message__text">Tu radicado es <strong>${p.radicado}</strong>. El revisor del Ministerio tiene 15 días hábiles para evaluar tu postulación.</div>
          </div>
        ` : ''}

        <div class="project-hero">
          <div>
            <div class="project-hero__rad">${p.radicado}</div>
            <h1 class="project-hero__title">${p.nombre}</h1>
            <div class="project-hero__meta">
              <span>📍 ${p.direccionPredio || ''}</span>
              <span>🏛 ${p.formuladora?.nombre || ''}</span>
              <span>📅 Postulado: ${formatoFecha(p.fechaPostulacion)}</span>
            </div>
            <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
              <span class="naowee-badge naowee-badge--${est.color} naowee-badge--quiet"><span class="naowee-badge__dot"></span>${est.label}</span>
              ${p.priorizado ? '<span class="naowee-badge naowee-badge--prio">⭐ Priorizado por el Ministerio</span>' : ''}
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--text-secondary);text-transform:uppercase">Presupuesto</div>
            <div class="project-hero__amount">${formatoMoneda(p.presupuesto)}</div>
            ${dias !== null ? `<div class="countdown ${dias < 5 ? 'countdown--urgent' : ''}" style="margin-top:14px">⏱ ${dias} día${dias===1?'':'s'} hábil${dias===1?'':'es'} ${p.estado === 'devuelta_subsanacion' ? 'para subsanar' : 'restante'+(dias===1?'':'s')}</div>` : ''}
          </div>
        </div>

        ${p.estado === 'devuelta_subsanacion' ? `
          <div class="naowee-message naowee-message--caution" role="status">
            <div class="naowee-message__header">
              <span class="naowee-message__icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 5v3.5M8 10.75v.05" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/><path d="M7.13 2.5L1.78 12.5a1 1 0 00.87 1.5h10.7a1 1 0 00.87-1.5L8.87 2.5a1 1 0 00-1.74 0z" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/></svg></span>
              <span class="naowee-message__title">Postulación devuelta — ${p.observaciones?.length || 0} observaciones para subsanar</span>
            </div>
            <div class="naowee-message__text">Tienes 15 días hábiles desde la devolución. Si necesitas más tiempo, puedes solicitar una prórroga.</div>
            <div class="naowee-message__action" style="display:flex;gap:8px;background:transparent;padding:0;height:auto">
              <a class="naowee-btn naowee-btn--quiet naowee-btn--small" href="prorroga.html?id=${p.idUnico}">Solicitar prórroga</a>
              <a class="naowee-btn naowee-btn--loud naowee-btn--small" href="subsanar.html?id=${p.idUnico}">Subsanar →</a>
            </div>
          </div>
          <div class="naowee-card" style="margin-bottom:20px">
            <div class="naowee-card__header"><div class="naowee-card__title">Observaciones del revisor</div></div>
            <div class="naowee-card__body" style="display:flex;flex-direction:column;gap:12px">
              ${(p.observaciones||[]).map(o => `
                <div style="border-left:3px solid var(--accent);padding:12px 14px;background:var(--orange-bg);border-radius:var(--radius-md)">
                  <div style="font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--accent);text-transform:uppercase;margin-bottom:4px">${o.area} · ${o.tipo}</div>
                  <div style="font-size:13px;line-height:1.5">${o.detalle}</div>
                  <div style="font-size:11px;color:var(--text-secondary);margin-top:6px">${formatoFecha(o.ts, true)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}

        ${p.estado === 'etapa_documental' ? `
          <div class="naowee-message naowee-message--informative" role="status">
            <div class="naowee-message__header">
              <span class="naowee-message__icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="#fff" stroke-width="1.4"/><path d="M8 7v4M8 4.5v.05" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg></span>
              <span class="naowee-message__title">Tu proyecto está en Etapa Documental</span>
            </div>
            <div class="naowee-message__text">Carga la documentación general y la documentación técnica por área para recibir el concepto de favorabilidad.</div>
            <a class="naowee-btn naowee-btn--loud naowee-btn--small naowee-message__action" href="etapa-documental.html?id=${p.idUnico}">Ir al repositorio →</a>
          </div>
        ` : ''}

        <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;align-items:start">
          <div class="naowee-card">
            <div class="naowee-card__header"><div class="naowee-card__title">Datos del proyecto</div></div>
            <div class="naowee-card__body" style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
              <div><div style="font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--text-secondary);text-transform:uppercase">Tipo</div><strong>${p.tipoSolicitud||'—'}</strong></div>
              <div><div style="font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--text-secondary);text-transform:uppercase">Fase</div><strong>${p.fase||'—'}</strong></div>
              <div><div style="font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--text-secondary);text-transform:uppercase">Monto solicitado</div><strong style="color:var(--green)">${formatoMoneda(p.montoSolicitado)}</strong></div>
              <div><div style="font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--text-secondary);text-transform:uppercase">Contrapartida</div><strong>${formatoMoneda(p.contrapartida)}</strong></div>
              <div style="grid-column:1/-1"><div style="font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--text-secondary);text-transform:uppercase;margin-bottom:6px">Cofinanciación</div><div>${(p.cofinanciacion||[]).map(f=>`<span class="naowee-badge naowee-badge--informative naowee-badge--quiet" style="margin-right:4px">${f}</span>`).join('')}</div></div>
              <div style="grid-column:1/-1"><div style="font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--text-secondary);text-transform:uppercase">Representante legal</div><strong>${p.representante?.nombre || '—'}</strong><div style="color:var(--text-secondary);font-size:12px">${p.representante?.documento || ''} · ${p.representante?.cargo || ''}</div></div>
            </div>
            ${p.cartaIntencion ? `
              <div class="naowee-card__footer">
                <div class="doc-row" style="flex:1">
                  <div class="doc-row__icon">📎</div>
                  <div class="doc-row__main">
                    <div class="doc-row__title">${p.cartaIntencion.name}</div>
                    <div class="doc-row__sub">Carta de Intención · ${(p.cartaIntencion.size/1024).toFixed(0)} KB</div>
                  </div>
                </div>
              </div>
            ` : ''}
          </div>

          <div class="naowee-card">
            <div class="naowee-card__header"><div class="naowee-card__title">Historial</div></div>
            <div class="naowee-card__body">
              <div class="timeline">
                ${(p.historial||[]).slice().reverse().map((h, i) => `
                  <div class="timeline__item ${i === 0 ? '' : 'timeline__item--done'} ${h.actor === 'sistema' ? 'timeline__item--system' : ''}">
                    <div class="timeline__ts">${formatoFecha(h.ts, true)}</div>
                    <div class="timeline__title">${h.evento}</div>
                    <div class="timeline__detail">por ${h.actor}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  }
</script>
</body>
</html>
