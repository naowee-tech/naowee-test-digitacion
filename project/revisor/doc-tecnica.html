<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Áreas técnicas · Revisor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/naowee-tech/naowee-design-system@v1.8.0/dist/design-system.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/pages.css?v=20260510c">
<style>
  /* Hero del proyecto en detalle (mismo lenguaje que doc-general) */
  .dt-hero {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 18px 22px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    margin-bottom: 18px;
  }
  .dt-hero__main { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .dt-hero__rad { font-size: 11.5px; font-weight: 600; letter-spacing: .35px; color: var(--text-secondary); text-transform: uppercase; }
  .dt-hero__title { font-size: 17px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
  .dt-hero__meta { font-size: 12.5px; color: var(--text-secondary); margin-top: 2px; }
  .dt-hero__amount { font-size: 18px; font-weight: 700; color: var(--green); white-space: nowrap; }

  /* Resumen de avance global */
  .dt-summary {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px;
    margin-bottom: 18px;
  }
  .dt-stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 14px 16px;
  }
  .dt-stat__lbl { font-size: 11px; font-weight: 700; letter-spacing: .35px; color: var(--text-secondary); text-transform: uppercase; }
  .dt-stat__val { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-top: 4px; font-variant-numeric: tabular-nums; }
  .dt-stat__val--green { color: var(--green); }
  .dt-stat__val--orange { color: var(--accent); }
  .dt-stat__val--red { color: #c01818; }
  .dt-stat__val--gray { color: var(--text-secondary); }
  @media (max-width: 760px) { .dt-summary { grid-template-columns: 1fr 1fr; } }

  /* Grid de las 8 áreas — mantenemos area-card pero refinamos */
  .dt-areas-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px;
  }
  .dt-area-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 18px 18px 16px;
    display: flex; flex-direction: column; gap: 10px;
    cursor: pointer; transition: transform .2s, box-shadow .2s, border-color .2s;
    position: relative;
  }
  .dt-area-card:hover {
    transform: translateY(-2px); border-color: var(--border-dark);
    box-shadow: 0 8px 18px -6px rgba(15, 17, 35, .12);
  }
  .dt-area-card__head {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
  }
  .dt-area-card__title {
    font-size: 14px; font-weight: 700; color: var(--text-primary); line-height: 1.3;
    flex: 1; min-width: 0;
  }
  .dt-area-card__icon {
    width: 32px; height: 32px; border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    background: var(--orange-bg); color: var(--accent); flex-shrink: 0;
  }
  .dt-area-card__progress {
    height: 6px; background: var(--border); border-radius: 99px; overflow: hidden;
  }
  .dt-area-card__progress > span {
    display: block; height: 100%; border-radius: 99px;
    transition: width .35s cubic-bezier(.4,0,.2,1);
  }
  .dt-area-card__stats {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11.5px; color: var(--text-secondary); font-weight: 600;
  }
  .dt-area-card__revisor {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-secondary);
    padding-top: 10px; border-top: 1px dashed var(--border);
  }
  .dt-area-card__avatar {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--orange-bg); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
  }
  .dt-area-card__cta {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 4px;
  }
  .dt-area-card__cta-text {
    font-size: 12px; font-weight: 700; color: var(--accent);
  }
</style>
</head>
<body>
<div class="shell">
  <div id="sidebarRoot"></div>
  <div class="main">
    <header class="top-header" id="topHeader"></header>
    <div class="page" id="pageContent"></div>
  </div>
</div>
<div id="demoRoleSwitcherRoot"></div>

<script type="module">
  import ProjectData from '../shared/data.js';
  import { mountShell } from '../shared/shell.js';
  import { ESTADOS_AREA, formatoMoneda } from '../shared/states.js';

  ProjectData.setPerfil('revisor');
  mountShell({ activeId: 'doc-tecnica' });

  const proyectos = ProjectData.getProyectos(p => p.estado === 'etapa_documental' && p.docsTecnica);
  const id = new URLSearchParams(location.search).get('id');
  const p = id ? ProjectData.getProyecto(id) : null;
  const pageContent = document.getElementById('pageContent');

  const ICONS = {
    back:  '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>',
    search:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
    close: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
    flag:  '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 1.5a.5.5 0 0 1 .5-.5h9.7a.5.5 0 0 1 .42.78L11.5 5l2.12 3.22a.5.5 0 0 1-.42.78H4v6.5a.5.5 0 0 1-1 0z"/></svg>',
    grid:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
    arrow: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>'
  };

  /* ════════════════════════════════════════════════════════════════
     Sin ?id → LISTA de proyectos
     ════════════════════════════════════════════════════════════════ */
  if (!p) {
    if (proyectos.length === 0) {
      pageContent.innerHTML = `
        <div class="page-fade-in">
          <div class="naowee-page-header naowee-page-header--centered">
            <div class="naowee-page-header__main">
              <h1>Áreas técnicas</h1>
              <p>Revisión de las 8 áreas técnicas (jurídica, financiera, arquitectónica, etc.) por proyecto.</p>
            </div>
          </div>
          <div class="naowee-empty-state">
            <div class="naowee-empty-state__title">Sin proyectos por revisar</div>
            <div class="naowee-empty-state__msg">No hay proyectos en etapa documental que requieran revisión técnica en este momento.</div>
          </div>
        </div>
      `;
    } else {
      renderList();
    }
  } else {
    renderDetail();
  }

  /* ════════════════════════════════════════════════════════════════
     LIST: tabla con avance técnico por proyecto
     ════════════════════════════════════════════════════════════════ */
  function renderList() {
    pageContent.innerHTML = `
      <div class="page-fade-in">
        <div class="naowee-page-header naowee-page-header--centered">
          <div class="naowee-page-header__main">
            <h1>Áreas técnicas</h1>
            <p>Selecciona un proyecto para revisar las 8 áreas técnicas (jurídica, financiera, arquitectónica, estructural, hidráulica, eléctrica, sostenibilidad, social).</p>
          </div>
        </div>

        <div class="naowee-table-card">
          <div class="naowee-table-card__toolbar">
            <div class="naowee-table-card__toolbar-left">
              <div class="naowee-searchbox naowee-searchbox--medium" id="searchbox" style="width:340px">
                <div class="naowee-searchbox__input-wrap">
                  <span class="naowee-searchbox__icon">${ICONS.search}</span>
                  <input type="text" class="naowee-searchbox__input" id="searchInput" placeholder="Buscar radicado, proyecto o municipio">
                  <button type="button" class="naowee-searchbox__clear" id="searchClear" aria-label="Limpiar búsqueda">${ICONS.close}</button>
                </div>
              </div>
            </div>
          </div>
          <div class="naowee-table-card__table-wrap">
            <table class="naowee-table--in-card">
              <thead>
                <tr>
                  <th>Radicado</th>
                  <th>Proyecto</th>
                  <th>Municipio</th>
                  <th class="numeric">Presupuesto</th>
                  <th class="numeric">Áreas aprobadas</th>
                  <th>Estado técnico</th>
                </tr>
              </thead>
              <tbody id="tbody">
                ${proyectos.map(pr => {
                  const areas = pr.docsTecnica?.areas || [];
                  const total = areas.length;
                  const aprobadas = areas.filter(a => a.estado === 'aprobado').length;
                  const enRevision = areas.filter(a => a.estado === 'en_revision').length;
                  const devueltas = areas.filter(a => a.estado === 'devuelto').length;
                  const allDone = aprobadas === total;
                  const badgeColor = allDone ? 'positive' : devueltas > 0 ? 'negative' : enRevision > 0 ? 'caution' : 'neutral';
                  const badgeLabel = allDone ? 'Todas aprobadas' : devueltas > 0 ? `${devueltas} devuelta${devueltas===1?'':'s'}` : enRevision > 0 ? `${enRevision} en revisión` : 'Pendiente';
                  return `
                    <tr data-search="${(pr.radicado+' '+pr.nombre+' '+pr.municipio).toLowerCase()}" onclick="location.href='doc-tecnica.html?id=${pr.idUnico}'">
                      <td class="naowee-table__cell-muted" style="font-weight:500;font-size:12px;letter-spacing:.2px;white-space:nowrap;color:var(--text-secondary)">
                        <span class="rad-cell">
                          ${pr.priorizado
                            ? `<span class="prio-flag" title="Priorizado">${ICONS.flag}</span>`
                            : `<span class="prio-flag prio-flag--empty" aria-hidden="true"></span>`}
                          ${(pr.radicado || '—').split('-CONV-')[0]}
                        </span>
                      </td>
                      <td class="naowee-table__cell-name proj-name-cell">
                        <div class="proj-name-cell__title" title="${pr.nombre}">${pr.nombre}</div>
                      </td>
                      <td>${pr.municipio}<div class="naowee-table__cell-muted" style="font-size:11.5px;margin-top:2px">${pr.departamento || ''}</div></td>
                      <td class="numeric" style="font-weight:600;white-space:nowrap">${formatoMoneda(pr.presupuesto)}</td>
                      <td class="numeric">
                        <div style="display:inline-flex;align-items:center;gap:8px;min-width:120px">
                          <div style="flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden">
                            <span style="display:block;height:100%;width:${(aprobadas/total)*100}%;background:${allDone ? 'var(--green)' : aprobadas > 0 ? 'var(--accent)' : 'var(--border-dark)'}"></span>
                          </div>
                          <span style="font-size:11.5px;font-weight:600;color:var(--text-secondary);min-width:60px;text-align:right">${aprobadas}/${total}</span>
                        </div>
                      </td>
                      <td><span class="naowee-badge naowee-badge--${badgeColor} naowee-badge--quiet">${badgeLabel}</span></td>
                    </tr>`;
                }).join('')}
              </tbody>
            </table>
            <div class="table-empty-state" id="emptyState" hidden>
              <div class="table-empty-state__icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
              </div>
              <div class="table-empty-state__title">Sin resultados</div>
              <div class="table-empty-state__msg">No encontramos proyectos que coincidan con tu búsqueda.</div>
            </div>
          </div>
        </div>
      </div>
    `;

    const searchBoxEl = document.getElementById('searchbox');
    const searchInputEl = document.getElementById('searchInput');
    function applySearch() {
      const q = searchInputEl.value.trim().toLowerCase();
      let visible = 0;
      document.querySelectorAll('#tbody tr').forEach(tr => {
        const show = !q || tr.dataset.search.includes(q);
        tr.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      const emptyEl = document.getElementById('emptyState');
      const tbodyEl = document.getElementById('tbody');
      if (visible === 0 && q) { emptyEl.hidden = false; tbodyEl.style.visibility = 'hidden'; }
      else { emptyEl.hidden = true; tbodyEl.style.visibility = ''; }
    }
    searchInputEl.addEventListener('input', () => {
      searchBoxEl.classList.toggle('naowee-searchbox--has-value', !!searchInputEl.value);
      applySearch();
    });
    document.getElementById('searchClear').addEventListener('click', () => {
      searchInputEl.value = '';
      searchBoxEl.classList.remove('naowee-searchbox--has-value');
      applySearch();
    });
  }

  /* ════════════════════════════════════════════════════════════════
     DETAIL: hero del proyecto + resumen + grid de las 8 áreas
     ════════════════════════════════════════════════════════════════ */
  function renderDetail() {
    const areas = p.docsTecnica?.areas || [];
    const total = areas.length;
    const aprobadas = areas.filter(a => a.estado === 'aprobado').length;
    const enRevision = areas.filter(a => a.estado === 'en_revision').length;
    const devueltas = areas.filter(a => a.estado === 'devuelto').length;
    const pendientes = total - aprobadas - enRevision - devueltas;

    pageContent.innerHTML = `
      <div class="page-fade-in">
        <a class="naowee-btn naowee-btn--mute naowee-btn--small back-btn" href="doc-tecnica.html" style="margin-bottom:14px">${ICONS.back}Volver al listado</a>

        <div class="naowee-page-header naowee-page-header--centered">
          <div class="naowee-page-header__main">
            <h1>Áreas técnicas</h1>
            <p>Cada área tiene su propio revisor especializado. Todos pueden ver toda la documentación, pero solo gestionan su área.</p>
          </div>
        </div>

        <div class="dt-hero">
          <div class="dt-hero__main">
            <span class="dt-hero__rad">${(p.radicado || '—').split('-CONV-')[0]}</span>
            <span class="dt-hero__title">${p.nombre}</span>
            <span class="dt-hero__meta">${p.municipio}${p.departamento ? `, ${p.departamento}` : ''} · ${p.tipoSolicitud || ''}</span>
          </div>
          <span class="dt-hero__amount">${formatoMoneda(p.presupuesto)}</span>
        </div>

        <div class="dt-summary">
          <div class="dt-stat">
            <div class="dt-stat__lbl">Total áreas</div>
            <div class="dt-stat__val">${total}</div>
          </div>
          <div class="dt-stat">
            <div class="dt-stat__lbl">Aprobadas</div>
            <div class="dt-stat__val dt-stat__val--green">${aprobadas}</div>
          </div>
          <div class="dt-stat">
            <div class="dt-stat__lbl">En revisión</div>
            <div class="dt-stat__val dt-stat__val--orange">${enRevision}</div>
          </div>
          <div class="dt-stat">
            <div class="dt-stat__lbl">Devueltas / pendientes</div>
            <div class="dt-stat__val ${devueltas > 0 ? 'dt-stat__val--red' : 'dt-stat__val--gray'}">${devueltas + pendientes}</div>
          </div>
        </div>

        <div class="dt-areas-grid">
          ${areas.map(a => {
            const e = ESTADOS_AREA[a.estado] || { label: a.estado, color: 'neutral' };
            const pct = a.items > 0 ? (a.aprobados / a.items * 100) : 0;
            const barColor = a.estado === 'aprobado' ? 'var(--green)'
              : a.estado === 'devuelto' ? '#c01818'
              : a.estado === 'en_revision' ? 'var(--accent)'
              : 'var(--border-dark)';
            const initial = (a.revisor || '').split(' ').map(s => s[0]).join('').slice(0, 2).toUpperCase() || '?';
            return `
              <div class="dt-area-card" onclick="location.href='revisar-area.html?id=${p.idUnico}&area=${a.id}'">
                <div class="dt-area-card__head">
                  <div class="dt-area-card__icon">${ICONS.grid}</div>
                  <span class="naowee-badge naowee-badge--${e.color} naowee-badge--quiet">${e.label}</span>
                </div>
                <div class="dt-area-card__title">${a.nombre}</div>
                <div class="dt-area-card__progress"><span style="width:${pct}%;background:${barColor}"></span></div>
                <div class="dt-area-card__stats">
                  <span>${a.aprobados} de ${a.items} ítems</span>
                  <span>${Math.round(pct)}%</span>
                </div>
                <div class="dt-area-card__revisor">
                  ${a.revisor ? `<span class="dt-area-card__avatar">${initial}</span><span>${a.revisor}</span>` : `<span style="color:var(--text-secondary);font-style:italic">Sin revisor asignado</span>`}
                </div>
                <div class="dt-area-card__cta">
                  <span class="dt-area-card__cta-text">Revisar área</span>
                  <span style="color:var(--accent)">${ICONS.arrow}</span>
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>
    `;
  }
</script>
</body>
</html>
